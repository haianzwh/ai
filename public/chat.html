<!DOCTYPE html><html lang=zh-CN><head>
<meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI 智能对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--bg2:#fff;--bg3:#f5f6f8;--text:#1e1e2f;--text2:#6b6b80;--text3:#a0a0b0;
  --border:rgba(0,0,0,.06);--shadow:0 1px 4px rgba(0,0,0,.04);
  --primary:#2563eb;--primary2:#3b82f6;--accent:#1d4ed8;
  --scrollbar:rgba(0,0,0,.06);
  --think-bg:#f8f9fc;--think-border:#e5e7eb;--think-color:#6b7280;
  --input-bg:#fff;--input-border:#d1d5db;
  --code-bg:#f3f4f6;--code-border:#e5e7eb;--code-color:#6366f1;
  --hl-bg:rgba(37,99,235,.06);--hl-color:#2563eb;
  --empty:rgba(0,0,0,.1)
}
.dark-mode{
  --bg:#111827;--bg2:#1f2937;--bg3:#374151;--text:#f3f4f6;--text2:#9ca3af;--text3:#6b7280;
  --border:rgba(255,255,255,.08);--shadow:0 1px 4px rgba(0,0,0,.3);
  --primary:#3b82f6;--primary2:#60a5fa;--accent:#2563eb;
  --scrollbar:rgba(255,255,255,.1);
  --think-bg:rgba(255,255,255,.03);--think-border:rgba(255,255,255,.1);--think-color:rgba(255,255,255,.5);
  --input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.12);
  --code-bg:rgba(0,0,0,.3);--code-border:rgba(255,255,255,.08);--code-color:#818cf8;
  --hl-bg:rgba(59,130,246,.12);--hl-color:#60a5fa;
  --empty:rgba(255,255,255,.15)
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;transition:margin-left .25s}
.sidebar .hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;align-items:center}
.sidebar .hd button{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.sidebar .hd .sidebar-aux{display:flex;gap:4px;flex-shrink:0}
.sidebar .hd .sidebar-aux button{flex:none;width:34px;padding:6px;font-size:14px;background:var(--bg3);color:var(--text2);border-radius:8px}
.sidebar .hd .sidebar-aux button:hover{background:var(--hl-bg);color:var(--hl-color)}
.sidebar-hidden .sidebar{margin-left:-280px}
.sidebar-hidden .main{max-width:100%}
.sidebar .hd{padding:16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.sidebar .hd button{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn-new{background:var(--primary);color:#fff}
.btn-new:hover{opacity:.9}
.btn-model{background:var(--bg3);color:var(--text2)}
.btn-model.active{background:var(--hl-bg)!important;color:var(--hl-color)!important}
.btn-model:hover{background:var(--hl-bg)}
.sidebar .title{padding:14px 16px 8px;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0}
.session{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text3);display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;transition:.1s;margin:2px 8px;border-radius:10px}
.session:hover{background:var(--hl-bg);color:var(--text)}
.session.active{background:var(--hl-bg);border-left-color:var(--primary);color:var(--text)}
.session .del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;visibility:hidden}
.session:hover .del{visibility:visible}
.session .del:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.main{flex:1;display:flex;flex-direction:column;height:100vh;max-width:calc(100% - 280px)}
.chat-header{padding:0 24px;height:56px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg2)}
.chat-header h2{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.chat-header .actions{display:flex;gap:6px;align-items:center}
.chat-header .actions button,.dark-toggle{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
.chat-header .actions button:hover,.dark-toggle:hover{background:var(--hl-bg);color:var(--hl-color);border-color:var(--primary)}
#msgArea{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;scroll-behavior:smooth}
#msgArea::-webkit-scrollbar{width:4px}
#msgArea::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.msg{width:100%;max-width:880px;margin-bottom:16px;animation:fadeIn .3s;padding:0 24px}
.msg .meta{font-size:11px;color:var(--text3);margin-bottom:6px;padding:0 4px}
.msg.user .meta{text-align:right}
.msg.user{display:flex;flex-direction:column;align-items:flex-end}
.msg.assistant{display:flex;flex-direction:column;align-items:flex-start}
.msg .bubble{width:fit-content;max-width:100%;padding:12px 20px;border-radius:20px;font-size:14px;line-height:1.7;text-align:left;word-break:break-word}
.msg.user .bubble{background:var(--primary);color:#fff;border-bottom-right-radius:6px}
.msg.assistant .bubble{background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:6px;color:var(--text);line-height:1.8;white-space:pre-wrap}
.msg.assistant .bubble h2{font-size:17px;font-weight:700;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--primary);color:var(--text)}
.msg.assistant .bubble h3{font-size:15px;font-weight:600;margin:12px 0 6px;color:var(--text)}
.msg.assistant .bubble h4{font-size:14px;font-weight:600;margin:8px 0 4px;color:var(--text2)}
.msg.assistant .bubble strong{color:var(--text)}
.msg.assistant .bubble .md-li{padding-left:4px;margin:4px 0;color:var(--text2)}
.msg.assistant .bubble .md-li::before{content:'• ';color:var(--text3)}
.msg.assistant .bubble .md-step{display:flex;align-items:flex-start;gap:10px;margin:8px 0;padding:10px 14px;background:var(--bg3);border-radius:10px}
.msg.assistant .bubble .step-num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.assistant .bubble .step-text{color:var(--text);font-size:14px;line-height:1.6;padding-top:3px}
.msg.assistant .bubble pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:10px;padding:14px 16px;margin:10px 0;overflow-x:auto;white-space:pre;font-size:13px}
.msg.assistant .bubble .code-wrap{position:relative;margin:10px 0}
.msg.assistant .bubble .code-wrap pre{margin:0}
.msg.assistant .bubble .copy-btn{position:absolute;top:8px;right:8px;background:var(--code-bg);border:1px solid var(--code-border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;opacity:0;transition:opacity .2s;z-index:1;color:var(--text2);line-height:1}
.msg.assistant .bubble .code-wrap:hover .copy-btn{opacity:1}
.msg.assistant .bubble .copy-btn:hover{background:var(--hl-bg);color:var(--hl-color)}
.msg.assistant .bubble code{font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:13px;line-height:1.5;color:var(--code-color)}
.msg.assistant .bubble :not(pre)>code{background:var(--hl-bg);padding:2px 8px;border-radius:4px;font-size:13px;color:var(--hl-color)}
.msg.assistant .bubble.thinking{background:transparent;border:none;color:var(--text3);font-size:13px;padding:4px 0}
.msg.assistant .bubble.thinking::after{content:'';display:inline-block;width:6px;height:6px;background:var(--primary);border-radius:50%;margin-left:6px;animation:dotPulse 1.2s infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1}}
.think-wrap{background:var(--think-bg);border:1px solid var(--think-border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.think-wrap summary{list-style:none;cursor:pointer;padding:10px 14px;font-size:12px;font-weight:500;color:var(--think-color);display:flex;align-items:center;gap:8px;transition:.15s;user-select:none}
.think-wrap summary::-webkit-details-marker{display:none}
.think-wrap summary::after{content:'展开 ▾';font-size:11px;margin-left:auto;opacity:.5;transition:transform .2s}
.think-wrap[open] summary::after{content:'收起 ▴'}
.think-wrap[open] .think-content{border-top:1px solid var(--think-border)}
.think-content{padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.input-bar{padding:4px 0 10px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2);display:flex;flex-direction:column;align-items:center}
.input-container{width:100%;max-width:880px;padding:0 24px}
.input-wrap{display:flex;gap:8px;align-items:center;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:14px;padding:4px 4px 4px 18px;transition:.2s}
.input-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.input-wrap textarea{flex:1;border:none;background:transparent;color:var(--text);font-size:14px;resize:none;outline:none;font-family:inherit;min-height:22px;max-height:100px;line-height:1.5;padding:7px 0}
.input-wrap textarea::placeholder{color:var(--text3)}
.input-wrap select{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:11px;cursor:pointer;outline:none;max-width:110px;flex-shrink:0}
.input-wrap select option{background:var(--bg2);color:var(--text)}
.input-wrap .send-btn{padding:7px 18px;border:none;border-radius:10px;background:var(--primary);color:#fff;cursor:pointer;font-size:13px;font-weight:500;flex-shrink:0;transition:.15s;height:34px}
.input-wrap .send-btn:hover{opacity:.9}
.input-wrap .send-btn:disabled{opacity:.3;cursor:default}
.input-tools{display:flex;gap:6px;align-items:center;padding:6px 4px 0}
.input-tools button{background:none;border:1px solid var(--border);color:var(--text3);padding:3px 10px;border-radius:8px;cursor:pointer;font-size:11px;transition:.15s}
.input-tools button:hover{background:var(--hl-bg);color:var(--hl-color)}
.empty-state{text-align:center;padding:120px 40px;color:var(--empty)}
.empty-state .icon{font-size:56px;margin-bottom:16px}
.empty-state p{font-size:14px;line-height:2;color:var(--empty)}
.menu-btn{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px;border-radius:6px;transition:.15s}
.menu-btn:hover{background:var(--hl-bg);color:var(--hl-color)}
@media(max-width:768px){
  .sidebar{display:none}
  .menu-btn{display:block}
  .main{max-width:100%}
  .msg{padding:0 12px;max-width:100%}
  .chat-header{padding:0 12px}
  .chat-header h2{max-width:120px;font-size:14px}
  .input-bar{padding:8px 0 12px}
  .input-container{padding:0 12px}
  .sidebar.open{display:flex;position:fixed;top:0;left:0;bottom:0;z-index:100;width:280px}
}
</style></head><body>

<div class=sidebar id=sidebar>
  <div class=hd>
    <button class="btn-new" onclick=newChat()>+ 新建</button>
    <div class=sidebar-aux>
      <button onclick="document.getElementById('sessionSearch').focus()" title=搜索>🔍</button>
      <button onclick=toggleSidebar() title=收起>◀</button>
    </div>
  </div>
  <input id=sessionSearch placeholder="搜索对话..." style="margin:8px 12px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:12px;outline:none;flex-shrink:0">
  <div class=title>📋 对话历史</div>
  <div style="overflow-y:auto;flex:1" id=sessionList></div>
  <div style="display:flex;gap:4px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0">
    <button class="btn-model" id=btnNormal onclick="setMode('chat')" style="flex:1;padding:7px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:.15s;background:var(--bg3);color:var(--text2)">💬 对话</button>
    <button class="btn-model" id=btnThink onclick="setMode('think')" style="flex:1;padding:7px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:.15s;background:var(--bg3);color:var(--text2)">🧠 思考</button>
  </div>
</div>

<div class=main>
  <div class=chat-header>
    <div style=display:flex;align-items:center;gap:12px>
      <button class=menu-btn onclick=toggleSidebar()>☰</button>
      <h2 id=chatTitle>🤖 AI 智能对话</h2>
    </div>
    <div class=actions>
      <button class=dark-toggle onclick=toggleDark() id=darkBtn>☀️</button>
    </div>
  </div>
  <div id=msgArea>
    <div class=empty-state><div class=icon>💬</div><p>选择或新建一个对话<br>输入消息即可开始</p></div>
  </div>
  <div class=input-bar>
    <div class=input-container>
      <div class=input-wrap>
        <textarea id=input rows=1 placeholder="输入消息..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <select id=modelSelect onchange=switchModel(this.value)></select>
        <button class=send-btn onclick=send()>发送</button>
      </div>
      <div class=input-tools>
        <button onclick=loadMessages() title="刷新">🔄 刷新</button>
      </div>
    </div>
    <input type=file id=fileInput multiple onchange=uploadFiles(this.files) style=display:none>
  </div>
</div>

<script>
var T=localStorage.getItem('auth_token');if(!T)location.href='/login.html'
var H={Authorization:'Bearer '+T},curSession=null,chatMode='chat',modelName='AI'
function now(){var d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.toTimeString().slice(0,8)}

function setMode(m){chatMode=m;document.getElementById('btnNormal').classList.toggle('active',m==='chat');document.getElementById('btnThink').classList.toggle('active',m==='think')}

async function loadModels(){
  var names={'deepseek-v4-flash-free':'DeepSeek V4','hy3-free':'Hy3','north-mini-code-free':'North Mini','nemotron-3-ultra-free':'Nemotron 3','mimo-v2.5-free':'MiMo V2.5','big-pickle':'Big Pickle','ling-2.6-flash-free':'Ling 2.6','minimax-m3-free':'MiniMax M3'}
  var sel=document.getElementById('modelSelect');if(!sel)return
  var r=await fetch('/auth/api/chat/models',{headers:H})
  var d=await r.json()
  if(!d.success||!d.models)return
  sel.innerHTML=''
  d.models.forEach(function(m){
    var o=document.createElement('option')
    o.value=m.id;o.textContent=names[m.id]||m.name;sel.appendChild(o)
  })
  sel.value=modelName||'deepseek-v4-flash-free'
}
async function switchModel(mid){
  modelName=mid
  if(curSession)await fetch('/auth/api/chat/sessions/'+curSession+'/model',{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
}
async function newChat(){
  var mid=document.getElementById('modelSelect')?document.getElementById('modelSelect').value:''
  var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
  var d=await r.json();if(d.success){curSession=d.id;selectSession(d.id)}
}

async function selectSession(sid){curSession=sid;loadSessions();loadMessages()}

async function loadSessions(){var r=await fetch('/auth/api/chat/sessions',{headers:H});var d=await r.json()
document.getElementById('sessionList').innerHTML=d.sessions.map(function(s){var c=s.id===curSession?' active':'';return'<div class="session'+c+'" onclick="selectSession(\''+s.id+'\')"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.title||'新对话')+'</span><button class=del onclick="event.stopPropagation();delSession(\''+s.id+'\')">×</button></div>'}).join('')}

async function delSession(sid){await fetch('/auth/api/chat/sessions/'+sid,{method:'DELETE',headers:H});if(curSession===sid){curSession=null;document.getElementById('msgArea').innerHTML='<div class=empty-state><div class=icon>💬</div><p>选择或新建一个对话</p></div>'}loadSessions()}

async function loadMessages(){if(!curSession)return;var r=await fetch('/auth/api/chat/sessions/'+curSession+'/messages',{headers:H});var d=await r.json()
var el=document.getElementById('msgArea');if(!d.messages.length){el.innerHTML='<div class=empty-state><div class=icon>💬</div><p>开始对话</p></div>';return}
document.getElementById('chatTitle').textContent=d.messages[0]?d.messages[0].content.slice(0,20)+'…':'对话'
el.innerHTML=d.messages.map(function(m){
  var label=m.role==='user'?esc(d.username):(d.model||'AI').split('-')[0]
  return '<div class="msg '+m.role+'"><div class=meta>'+label+' · '+m.time+'</div>'+formatContent(m.content||'',m.thinking||'')+'</div>'
}).join('');el.scrollTop=el.scrollHeight;modelName=d.model||'AI'
var sel=document.getElementById('modelSelect');if(sel)sel.value=modelName}

async function send(){
  var input=document.getElementById('input'),text=input.value.trim();if(!text)return
  input.value='';if(!curSession){var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:H});var d=await r.json();curSession=d.id;loadSessions()}
  input.style.height='auto';document.querySelector('.send-btn').disabled=true
  var sendText=chatMode==='think'?'<think>逐步思考</think>'+text:text
  var el=document.getElementById('msgArea')
  var u=document.getElementById('userInfo')
  if(el.querySelector('.empty-state'))el.innerHTML=''
  el.innerHTML+='<div class="msg user"><div class=meta>'+(u?esc(u.textContent):'我')+' · '+now()+'</div><div class=bubble>'+esc(text)+'</div></div>'
  var aiDiv=document.createElement('div');aiDiv.className='msg assistant';aiDiv.innerHTML='<div class=meta>'+(modelName||'AI').split('-')[0]+' · '+now()+'</div><div class="bubble thinking">思考中</div>';el.appendChild(aiDiv);el.scrollTop=el.scrollHeight
  // 等待后端回复
  try{
    var ctrl=new AbortController();setTimeout(function(){ctrl.abort()},90000)
    var r=await fetch('/auth/api/chat/sessions/'+curSession+'/send',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({content:sendText}),signal:ctrl.signal})
    if(!r.ok){var t=await r.text().catch(function(){return''});aiDiv.innerHTML='<div class=bubble>❌ '+r.status+': '+esc(t.slice(0,60))+'</div>';return}
    var d=await r.json()
    if(d.content||d.thinking){var b=aiDiv.querySelector('.bubble');b.outerHTML=formatContent(d.content||'',d.thinking||'')}else{var b=aiDiv.querySelector('.bubble');b.outerHTML='<div class=bubble>'+(d.error?'❌ '+esc(d.error):'(无回复)')+'</div>'}
    el.scrollTop=el.scrollHeight;loadSessions()
  }catch(e){aiDiv.innerHTML='<div class=bubble>❌ '+(e.name==='AbortError'?'请求超时，请重试':esc(e.message))+'</div>'}
  finally{document.querySelector('.send-btn').disabled=false}
}

function formatContent(txt, thinking){
  // 旧消息：从 content 里提取 think 标签
  if(!thinking){
    var tm=txt.match(/<think>([\s\S]*?)<\/think>/)
    if(tm){
      var before=txt.slice(0,txt.indexOf('<think>')).trim()
      var after=txt.slice(txt.indexOf('</think>')+8).trim()
      var tc=tm[1].trim()
      if(before&&tc.startsWith(before))tc=tc.slice(before.length).trim()
      thinking=(before?before+'\n\n':'')+tc
      txt=after
    }
  }
  var mainText=txt
  var sm=mainText.match(/([\s\S]*?)\n[=\-]{3,}\n([\s\S]*)/)
  if(sm&&!thinking){thinking=sm[1];mainText=sm[2].trim()}
  if(!thinking&&chatMode==='think'&&txt.length>100){thinking=txt;mainText=''}
  var html=''
  if(thinking)html='<details class=think-wrap><summary>🧠 思考过程</summary><div class=think-content>'+esc(thinking)+'</div></details>'
  html+='<div class=bubble>'+(mainText?md(esc(mainText)):'')+'</div>'
  return html
}

async function uploadFiles(files){for(var i=0;i<files.length;i++){var fd=new FormData();fd.append('file',files[i]);await fetch('/auth/api/upload',{method:'POST',headers:H,body:fd})}loadMessages()}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function copyCode(btn){
  var code=btn.parentElement.querySelector('pre code')
  if(!code)return
  var t=code.textContent
  navigator.clipboard.writeText(t).then(function(){
    btn.textContent='✓';setTimeout(function(){btn.textContent='📋'},1500)
  }).catch(function(){alert('复制失败')})
}
function toggleDark(){
  var b=document.body;b.classList.toggle('dark-mode')
  var isDark=b.classList.contains('dark-mode')
  document.getElementById('darkBtn').textContent=isDark?'🌙':'☀️'
  localStorage.setItem('theme',isDark?'dark':'light')
}
function toggleSidebar(){
  document.body.classList.toggle('sidebar-hidden')
  localStorage.setItem('sidebar',document.body.classList.contains('sidebar-hidden')?'hidden':'')
}
// 搜索对话
document.addEventListener('input',function(e){
  if(e.target.id!=='sessionSearch')return
  var q=e.target.value.toLowerCase()
  document.querySelectorAll('#sessionList .session').forEach(function(s){
    s.style.display=q&&!s.textContent.toLowerCase().includes(q)?'none':''
  })
})
// 初始化主题和侧边栏
(function(){
  var t=localStorage.getItem('theme')

function md(s){
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,'<div class=code-wrap><button class=copy-btn onclick=copyCode(this)>📋</button><pre><code class="lang-$1">$2</code></pre></div>')
       .replace(/`([^`]+)`/g,'<code>$1</code>')
       .replace(/^(\d+)\.\s(.+)$/gm,'<div class=md-step><span class=step-num>$1</span><span class=step-text>$2</span></div>')
       .replace(/^### (.+)$/gm,'<h4>$1</h4>')
       .replace(/^## (.+)$/gm,'<h3>$1</h3>')
       .replace(/^# (.+)$/gm,'<h2>$1</h2>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/^- (.+)$/gm,'<div class=md-li>$1</div>')
  return s
}
