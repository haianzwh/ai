<!DOCTYPE html><html lang=zh-CN><head>
<meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#0f1729;color:#e2e8f0;height:100vh;display:flex;overflow:hidden}

/* ===== 侧边栏 ===== */
.sidebar{width:280px;background:#0b1120;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
.sidebar .hd{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:8px;flex-shrink:0}
.sidebar .hd button{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn-new{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-new:hover{opacity:.9;transform:translateY(-1px)}
.btn-model{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.btn-model.active{background:rgba(99,102,241,.2);color:#818cf8;box-shadow:inset 0 0 0 1px rgba(99,102,241,.3)}
.btn-model:hover{background:rgba(255,255,255,.1)}
.sidebar .title{padding:12px 16px 8px;font-size:11px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.session{padding:10px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.4);display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;transition:.1s;margin:1px 0}
.session:hover{background:rgba(99,102,241,.06);color:#e2e8f0}
.session.active{background:rgba(99,102,241,.1);border-left-color:#6366f1;color:#e2e8f0}
.session .del{background:none;border:none;color:rgba(255,255,255,.15);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;visibility:hidden}
.session:hover .del{visibility:visible}
.session .del:hover{color:#ef4444;background:rgba(239,68,68,.1)}

/* ===== 主区域 ===== */
.main{flex:1;display:flex;flex-direction:column;height:100vh;max-width:calc(100% - 280px)}
.chat-header{padding:12px 24px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#0f1729}
.chat-header h2{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.chat-header .actions{display:flex;gap:4px}
.chat-header .actions button{background:none;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
.chat-header .actions button:hover{background:rgba(255,255,255,.05);color:#e2e8f0;border-color:rgba(255,255,255,.15)}

/* ===== 消息区 ===== */
#msgArea{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
#msgArea::-webkit-scrollbar{width:4px}
#msgArea::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.msg{max-width:80%;margin-bottom:8px;animation:fadeIn .3s}
.msg .meta{font-size:11px;color:rgba(255,255,255,.25);margin-bottom:4px}
.msg.user .meta{text-align:right}
.msg.user{margin-left:auto}
.msg .bubble{width:fit-content;padding:8px 14px;border-radius:16px;font-size:13px;line-height:1.5;text-align:left;word-break:break-word}
.msg.user .bubble{margin-left:auto}
.msg.assistant .bubble{margin-right:auto}
.msg.user .bubble{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(99,102,241,.2)}
.msg.assistant .bubble{background:rgba(255,255,255,.06);border-bottom-left-radius:4px;color:#e2e8f0}
.msg.assistant .bubble.thinking{background:transparent;color:rgba(255,255,255,.3);font-size:12px;padding:2px 0}
.msg.assistant .bubble.thinking::after{content:'';display:inline-block;width:4px;height:4px;background:#818cf8;border-radius:50%;margin-left:4px;animation:dotPulse 1.2s infinite}
@keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ===== 思维链 ===== */
.think-wrap{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.06);border-radius:10px;margin-bottom:6px;overflow:hidden}
.think-header{padding:6px 12px;font-size:11px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.think-content{padding:8px 12px;font-size:11px;color:rgba(255,255,255,.45);line-height:1.6;white-space:pre-wrap;max-height:300px;overflow-y:auto}

/* ===== 输入栏 ===== */
.input-bar{padding:8px 16px 12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;background:linear-gradient(180deg,transparent,#0f1729)}
.input-wrap{display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:4px 4px 4px 18px;transition:.2s;backdrop-filter:blur(12px)}
.input-wrap:focus-within{border-color:#818cf8;background:rgba(255,255,255,.08);box-shadow:0 0 0 4px rgba(99,102,241,.1)}
.input-wrap textarea{flex:1;border:none;background:transparent;color:#e2e8f0;font-size:14px;resize:none;outline:none;font-family:inherit;min-height:24px;max-height:120px;line-height:1.5;padding:8px 0}
.input-wrap textarea::placeholder{color:rgba(255,255,255,.2)}
.input-wrap .tool-btn{background:none;border:none;color:rgba(255,255,255,.25);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center}
.input-wrap .tool-btn:hover{color:#818cf8;background:rgba(99,102,241,.12)}
.input-wrap .send-btn{padding:8px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;cursor:pointer;font-size:13px;font-weight:600;flex-shrink:0;transition:.15s;height:38px}
.input-wrap .send-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 15px rgba(99,102,241,.3)}
.input-wrap .send-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}

.empty-state{text-align:center;padding:120px 40px;color:rgba(255,255,255,.15)}
.empty-state .icon{font-size:56px;margin-bottom:16px}
.empty-state p{font-size:14px;line-height:2;color:rgba(255,255,255,.2)}

@media(max-width:768px){
  .sidebar{display:none}
  .main{max-width:100%}
  .sidebar.open{display:flex;position:fixed;top:0;left:0;bottom:0;z-index:100;width:280px}
}
</style></head><body>

<div class=sidebar id=sidebar>
  <div class=hd>
    <button class="btn-new" onclick=newChat()>+ 新建</button>
    <button class="btn-model" id=btnNormal onclick="setMode('chat')">💬 对话</button>
    <button class="btn-model" id=btnThink onclick="setMode('think')">🧠 思考</button>
  </div>
  <div class=title>📋 对话历史</div>
  <div style="overflow-y:auto;flex:1" id=sessionList></div>
</div>

<div class=main>
  <div class=chat-header>
    <h2 id=chatTitle>🤖 AI Chat</h2>
    <div class=actions>
      <select id=modelSelect onchange=switchModel(this.value) style="background:rgba(255,255,255,.06);color:#e2e8f0;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;outline:none"></select>
      <button onclick="document.getElementById('fileInput').click()" title="上传文件">📎 文件</button>
      <button onclick=loadMessages() title="刷新">🔄 刷新</button>
    </div>
  </div>
  <div id=msgArea>
    <div class=empty-state><div class=icon>💬</div><p>选择或新建一个对话<br>输入消息即可开始</p></div>
  </div>
  <div class=input-bar>
    <div class=input-wrap>
      <textarea id=input rows=1 placeholder="输入消息..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class=tool-btn onclick="document.getElementById('fileInput').click()" title=上传>📎</button>
      <button class=send-btn onclick=send()>发送</button>
    </div>
    <input type=file id=fileInput multiple onchange=uploadFiles(this.files) style=display:none>
  </div>
</div>

<script>
var T=localStorage.getItem('auth_token');if(!T)location.href='/login.html'
var H={Authorization:'Bearer '+T},curSession=null,chatMode='chat',modelName='AI'
function now(){var d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.toTimeString().slice(0,8)}

function setMode(m){chatMode=m;document.getElementById('btnNormal').classList.toggle('active',m==='chat');document.getElementById('btnThink').classList.toggle('active',m==='think')}

async function loadModels(){
  var sel=document.getElementById('modelSelect');if(!sel)return
  var r=await fetch('/auth/api/chat/models',{headers:H})
  var d=await r.json()
  if(!d.success||!d.models)return
  sel.innerHTML=''
  d.models.forEach(function(m){
    var o=document.createElement('option')
    o.value=m.id;o.textContent=m.name;sel.appendChild(o)
  })
  sel.value=modelName||'deepseek-v4-flash-free'
}
async function switchModel(mid){
  modelName=mid
  if(curSession)await fetch('/auth/api/chat/sessions/'+curSession+'/model',{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
}
async function newChat(){
  var mid=document.getElementById('modelSelect')?document.getElementById('modelSelect').value:''
  var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
  var d=await r.json();if(d.success){curSession=d.id;selectSession(d.id)}
}

async function selectSession(sid){curSession=sid;loadSessions();loadMessages()}

async function loadSessions(){var r=await fetch('/auth/api/chat/sessions',{headers:H});var d=await r.json()
document.getElementById('sessionList').innerHTML=d.sessions.map(function(s){var c=s.id===curSession?' active':'';return'<div class="session'+c+'" onclick="selectSession(\''+s.id+'\')"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.title||'新对话')+'</span><button class=del onclick="event.stopPropagation();delSession(\''+s.id+'\')">×</button></div>'}).join('')}

async function delSession(sid){await fetch('/auth/api/chat/sessions/'+sid,{method:'DELETE',headers:H});if(curSession===sid){curSession=null;document.getElementById('msgArea').innerHTML='<div class=empty-state><div class=icon>💬</div><p>选择或新建一个对话</p></div>'}loadSessions()}

async function loadMessages(){if(!curSession)return;var r=await fetch('/auth/api/chat/sessions/'+curSession+'/messages',{headers:H});var d=await r.json()
var el=document.getElementById('msgArea');if(!d.messages.length){el.innerHTML='<div class=empty-state><div class=icon>💬</div><p>开始对话</p></div>';return}
document.getElementById('chatTitle').textContent=d.messages[0]?d.messages[0].content.slice(0,20)+'…':'对话'
el.innerHTML=d.messages.map(function(m){
  var label=m.role==='user'?esc(d.username):(d.model||'AI').split('-')[0]
  return '<div class="msg '+m.role+'"><div class=meta>'+label+' · '+m.time+'</div>'+formatContent(m.content||'',m.thinking||'')+'</div>'
}).join('');el.scrollTop=el.scrollHeight;modelName=d.model||'AI'
var sel=document.getElementById('modelSelect');if(sel)sel.value=modelName}

async function send(){
  var input=document.getElementById('input'),text=input.value.trim();if(!text)return
  input.value='';if(!curSession){var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:H});var d=await r.json();curSession=d.id;loadSessions()}
  input.style.height='auto';document.querySelector('.send-btn').disabled=true
  var sendText=chatMode==='think'?'<think>逐步思考</think>'+text:text
  var el=document.getElementById('msgArea')
  var u=document.getElementById('userInfo')
  if(el.querySelector('.empty-state'))el.innerHTML=''
  el.innerHTML+='<div class="msg user"><div class=meta>'+(u?esc(u.textContent):'我')+' · '+now()+'</div><div class=bubble>'+esc(text)+'</div></div>'
  var aiDiv=document.createElement('div');aiDiv.className='msg assistant';aiDiv.innerHTML='<div class=meta>'+(modelName||'AI').split('-')[0]+' · '+now()+'</div><div class="bubble thinking">思考中</div>';el.appendChild(aiDiv);el.scrollTop=el.scrollHeight
  // 等待后端回复
  try{
    var r=await fetch('/auth/api/chat/sessions/'+curSession+'/send',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({content:sendText})})
    if(!r.ok){var t=await r.text().catch(function(){return''});aiDiv.innerHTML='<div class=bubble>❌ '+r.status+': '+esc(t.slice(0,60))+'</div>';return}
    var d=await r.json()
    if(d.content){var b=aiDiv.querySelector('.bubble');b.outerHTML=formatContent(d.content)}else{var b=aiDiv.querySelector('.bubble');b.outerHTML='<div class=bubble>'+(d.error?'❌ '+esc(d.error):'(无回复)')+'</div>'}
    el.scrollTop=el.scrollHeight;loadSessions()
  }catch(e){aiDiv.innerHTML='<div class=bubble>❌ '+esc(e.message)+'</div>'}
  document.querySelector('.send-btn').disabled=false
}

function formatContent(txt, thinking){
  if(!thinking){
    var tm=txt.match(/<think>([\s\S]*?)<\/think>/)
    if(tm){thinking=tm[1];txt=txt.replace(/<think>[\s\S]*?<\/think>/,'').trim()}
  }
  var mainText=txt
  var sm=mainText.match(/([\s\S]*?)\n[=\-]{3,}\n([\s\S]*)/)
  if(sm&&!thinking){thinking=sm[1];mainText=sm[2].trim()}
  if(!thinking&&chatMode==='think'&&txt.length>100){thinking=txt;mainText=''}
  var html=''
  if(thinking)html='<div class=think-wrap><div class=think-header>🧠 思考过程</div><div class=think-content>'+esc(thinking)+'</div></div>'
  html+='<div class=bubble>'+(mainText?esc(mainText):'')+'</div>'
  return html
}

async function uploadFiles(files){for(var i=0;i<files.length;i++){var fd=new FormData();fd.append('file',files[i]);await fetch('/auth/api/upload',{method:'POST',headers:H,body:fd})}loadMessages()}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
setMode('chat');loadModels();loadSessions();(async function(){await newChat()})();
</script></body></html>
