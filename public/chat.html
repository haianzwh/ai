<!DOCTYPE html><html lang=zh-CN><head>
<meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI 智能对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;overflow:hidden}
body.dark-mode{background:#0a0a14;color:#c0c0c0}
body.dark-mode .sidebar{background:#0e0e1e}
body.dark-mode .msg.user .bubble{background:#1e1e32}
body.light-mode{background:#f5f5f8;color:#1a1a2e}
body.light-mode .sidebar{background:#fff;border-right-color:rgba(0,0,0,.06)}
body.light-mode .sidebar .logo{color:#1a1a2e}
body.light-mode .group-label{color:rgba(0,0,0,.35)}
body.light-mode .session{color:rgba(0,0,0,.5)}
body.light-mode .session:hover{background:rgba(0,0,0,.06);color:#1a1a2e}
body.light-mode .session.active{background:rgba(99,102,241,.1);color:#1a1a2e}
body.light-mode .sidebar-footer{border-top-color:rgba(0,0,0,.06)}
body.light-mode .sidebar-footer .uname{color:rgba(0,0,0,.5)}
body.light-mode #sessionSearch{background:#f0f0f5;border:1px solid rgba(0,0,0,.15);color:#1a1a2e}
body.light-mode #sessionSearch::placeholder{color:rgba(0,0,0,.3)}
body.light-mode #sessionSearch::placeholder{color:rgba(0,0,0,.3)}
body.light-mode .sidebar-footer button{color:rgba(0,0,0,.4)}
body.light-mode .sidebar-footer button:hover{background:rgba(0,0,0,.05);color:#1a1a2e}
body.light-mode .msg.user .bubble{background:#e4e4f0;color:#1a1a2e}
body.light-mode .msg.assistant .bubble{background:#f8f9fb;border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:16px 20px;color:#1a1a2e;border-bottom-left-radius:6px}
body.light-mode .msg.assistant .bubble h2{color:#1a1a2e}
body.light-mode .msg.assistant .bubble h3{color:#1a1a2e}
body.light-mode .msg.assistant .bubble strong{color:#1a1a2e}
body.light-mode .msg.assistant .bubble .md-li{color:rgba(0,0,0,.55)}
body.light-mode .msg.assistant .bubble .step-text{color:#1a1a2e}
body.light-mode .msg .meta{color:rgba(0,0,0,.3)}
body.light-mode .input-wrap{background:#fff;border-color:rgba(0,0,0,.1);backdrop-filter:none}
body.light-mode .input-wrap:focus-within{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.08)}
body.light-mode .input-wrap textarea{color:#1a1a2e}
body.light-mode .input-wrap textarea::placeholder{color:rgba(0,0,0,.25)}
body.light-mode .input-bottom .left button{color:rgba(0,0,0,.4)}
body.light-mode .input-bottom .left button:hover{background:rgba(0,0,0,.05);color:#1a1a2e}
body.light-mode #modelSelect{background:#f0f0f5;color:#1a1a2e;border-color:rgba(0,0,0,.18);font-weight:500}
body.light-mode .input-bottom select{background:#f0f0f5;color:#1a1a2e;border-color:rgba(0,0,0,.18)}
body.light-mode .footer-text{color:rgba(0,0,0,.2)}
body.light-mode .think-wrap{border-color:rgba(0,0,0,.08);background:rgba(0,0,0,.02)}
body.light-mode .think-wrap summary{color:rgba(0,0,0,.4)}
body.light-mode .think-content{color:rgba(0,0,0,.5);border-top-color:rgba(0,0,0,.08)}
body.light-mode .msg.assistant .bubble pre{background:#f0f0f5;border-color:rgba(0,0,0,.08);color:#1a1a2e}
body.light-mode .msg.assistant .bubble code{color:#6366f1}
body.light-mode .msg.assistant .bubble :not(pre)>code{background:rgba(99,102,241,.08);color:#6366f1}
body.light-mode .msg.assistant .bubble .copy-btn{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.35)}
body.light-mode .msg.assistant .bubble .copy-btn:hover{background:rgba(0,0,0,.1);color:#1a1a2e}
body.light-mode .msg-actions button{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.35)}
body.light-mode .msg-actions button:hover{background:rgba(0,0,0,.06);color:#1a1a2e}
body.light-mode .edit-ta{background:#f0f0f5;border-color:rgba(0,0,0,.12);color:#1a1a2e}
body.light-mode .edit-cancel{background:#f0f0f5;border-color:rgba(0,0,0,.12);color:rgba(0,0,0,.5)}
body.light-mode #msgArea::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08)}
body.light-mode .dark-btn{color:rgba(0,0,0,.4)}
body.light-mode .sidebar-collapse{color:rgba(0,0,0,.3)}
body.light-mode .sidebar-collapse:hover{background:rgba(0,0,0,.04)}
body.light-mode .session .del{color:rgba(0,0,0,.2)}
body.light-mode .session .del:hover{color:#ef4444}
select option{background:#fff;color:#1a1a2e}

/* ===== 侧边栏 ===== */
.sidebar{width:300px;background:#16162a;border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;flex-shrink:0;height:100vh;transition:margin-left .25s}
.sidebar .hd{padding:16px;display:flex;gap:8px;flex-shrink:0;align-items:center;justify-content:space-between}
.sidebar .hd .logo{font-size:16px;font-weight:700;color:#e0e0e0;letter-spacing:1px}
.btn-new{width:calc(100% - 32px);margin:0 16px 12px;padding:11px;border:none;border-radius:10px;background:rgba(160,195,220,.2);color:rgba(180,210,240,.8);cursor:pointer;font-size:13px;font-weight:500;transition:.15s;text-align:center;flex-shrink:0}
.btn-new:hover{background:rgba(160,195,220,.3);color:rgba(200,225,245,.95)}
body.light-mode .btn-new{background:rgba(140,180,215,.2);color:rgba(60,110,155,.8)}
body.light-mode .btn-new:hover{background:rgba(140,180,215,.35);color:rgba(50,95,140,.95)}
.sidebar .title{padding:8px 16px 4px;font-size:11px;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:.5px;flex-shrink:0}
.session-group{padding:0 8px;margin-bottom:4px}
.group-label{padding:6px 8px 2px;font-size:11px;color:rgba(255,255,255,.2);font-weight:500}
.session{padding:8px 10px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.35);border-radius:8px;transition:.1s;margin:1px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-left:2px solid transparent}
.session:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.session.active{background:rgba(99,102,241,.15);border-left-color:#818cf8;color:#e0e0e0}
.session .del{float:right;background:none;border:none;color:rgba(255,255,255,.15);cursor:pointer;font-size:12px;padding:0 4px;border-radius:4px;visibility:hidden}
.session:hover .del{visibility:visible}
.session .del:hover{color:#ef4444}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px;flex-shrink:0;margin-top:auto}
.sidebar-footer .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600}
.sidebar-footer .uname{font-size:13px;color:rgba(255,255,255,.5);flex:1}
.sidebar-hidden .sidebar{margin-left:-300px}
.sidebar-hidden .main{max-width:100%}
.sidebar-hidden .sidebar-open-btn{display:flex !important}
.sidebar-open-btn{display:none !important;position:fixed;top:12px;left:12px;z-index:50;width:36px;height:36px;border:none;border-radius:10px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);cursor:pointer;font-size:18px;align-items:center;justify-content:center;transition:.15s}
.sidebar-open-btn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.6)}
#sessionSearch{margin:0 16px 10px;padding:9px 12px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);font-size:12px;outline:none;flex-shrink:0;transition:.15s}
#sessionSearch:focus{border-color:rgba(99,102,241,.4)}
.sidebar-collapse{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:18px;padding:4px 6px;border-radius:6px;transition:.15s}
.sidebar-collapse:hover{background:rgba(255,255,255,.06)}

/* ===== 主区域 ===== */
.main{flex:1;display:flex;flex-direction:column;height:100vh;max-width:calc(100% - 300px)}
.nav-bar{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 8px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.04);backdrop-filter:blur(12px);transition:all .25s;max-height:50vh;overflow-y:auto;min-width:16px}
.nav-bar::-webkit-scrollbar{width:2px}
.nav-bar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:1px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);cursor:pointer;transition:all .2s;flex-shrink:0}
.nav-dot:hover,.nav-dot.active{background:#818cf8;transform:scale(1.4);box-shadow:0 0 6px rgba(129,140,248,.3)}
.nav-preview{position:fixed;right:44px;top:50%;transform:translateY(-50%);background:rgba(30,30,50,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 14px;width:260px;max-height:50vh;overflow-y:auto;font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}
.nav-preview::-webkit-scrollbar{width:2px}
.nav-preview::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:1px}
body.light-mode .nav-bar{background:rgba(255,255,255,.5)}
body.light-mode .nav-dot{background:rgba(0,0,0,.12)}
body.light-mode .nav-dot:hover,body.light-mode .nav-dot.active{background:#6366f1}
body.light-mode .nav-preview{background:rgba(250,250,252,.95);border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.5)}

/* ===== 消息区 ===== */
#msgArea{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;scroll-behavior:smooth;padding:12px 0}
#msgArea::-webkit-scrollbar{width:4px}
#msgArea::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.msg{width:100%;max-width:900px;margin-bottom:24px;padding:0 40px}
.msg.user{display:flex;flex-direction:column;align-items:flex-end}
.msg.assistant{display:flex;flex-direction:column;align-items:flex-start}
.msg .bubble{width:fit-content;max-width:80%;padding:12px 18px;border-radius:18px;font-size:14px;line-height:1.7;word-break:break-word}
.msg.user .bubble{background:#2d2d44;color:#e0e0e0;border-bottom-right-radius:6px}
.msg.assistant .bubble{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 20px;color:#e0e0e0;line-height:1.8;white-space:pre-wrap;border-bottom-left-radius:6px}
.msg.assistant .bubble h2{font-size:18px;font-weight:700;margin:20px 0 10px;color:#f0f0f0}
.msg.assistant .bubble h3{font-size:16px;font-weight:600;margin:16px 0 8px;color:#e8e8e8}
.msg.assistant .bubble h4{font-size:15px;font-weight:600;margin:12px 0 6px;color:#d0d0d0}
.msg.assistant .bubble strong{color:#f0f0f0}
.msg.assistant .bubble p{margin:8px 0}
.msg.assistant .bubble .md-li{padding-left:4px;margin:4px 0;color:rgba(255,255,255,.6)}
.msg.assistant .bubble .md-li::before{content:'• ';color:rgba(255,255,255,.25)}
.msg.assistant .bubble .md-step{display:flex;align-items:flex-start;gap:10px;margin:8px 0;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:10px}
.msg.assistant .bubble .step-num{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#6366f1;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.msg.assistant .bubble .step-text{color:#e0e0e0;font-size:14px;line-height:1.6;padding-top:3px}
.msg.assistant .bubble pre{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;margin:10px 0;overflow-x:auto;white-space:pre;font-size:13px}
.msg.assistant .bubble .code-wrap{position:relative;margin:10px 0}
.msg.assistant .bubble .code-wrap pre{margin:0}
.msg.assistant .bubble .copy-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;z-index:1;color:rgba(255,255,255,.5);line-height:1;transition:.15s}
.msg.assistant .bubble .copy-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.msg.assistant .bubble code{font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:13px;line-height:1.5;color:#a5b4fc}
.msg.assistant .bubble :not(pre)>code{background:rgba(99,102,241,.12);padding:2px 8px;border-radius:4px;font-size:13px;color:#818cf8}
.msg.assistant .bubble.thinking{background:transparent;color:rgba(255,255,255,.35);font-size:13px;padding:4px 0}
.msg.assistant .bubble.thinking::after{content:'';display:inline-block;width:6px;height:6px;background:#818cf8;border-radius:50%;margin-left:6px;animation:dotPulse 1.2s infinite}
.interrupted{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.12);font-size:11px;padding:6px 0;width:100%;max-width:900px;margin:0 auto}
.interrupted span{flex:1;height:0;border-top:1px solid rgba(255,255,255,.08)}
body.light-mode .interrupted{color:rgba(0,0,0,.1)}
body.light-mode .interrupted span{border-top-color:rgba(0,0,0,.06)}
.msg .meta{font-size:11px;color:rgba(255,255,255,.2);margin-bottom:6px;padding:0 2px}
.msg.user .meta{text-align:right}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1}}

/* 思考过程 */
.think-wrap{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;margin-bottom:12px;overflow:hidden}
.think-wrap summary{list-style:none;cursor:pointer;padding:10px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:8px;transition:.15s;user-select:none}
.think-wrap summary::-webkit-details-marker{display:none}
.think-wrap summary::after{content:'▾';font-size:10px;margin-left:auto;opacity:.4;transition:transform .2s}
.think-wrap[open] summary::after{transform:rotate(180deg)}
.think-wrap[open] .think-content{border-top:1px solid rgba(255,255,255,.06)}
.think-content{padding:10px 14px;font-size:13px;color:rgba(255,255,255,.5);line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto}

/* 用户消息操作按钮 */
.msg-actions{display:flex;gap:6px;margin-top:6px;padding:0 4px;opacity:0;transition:opacity .2s}
.msg.user:hover .msg-actions{opacity:1}
.msg-actions button{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.35);padding:3px 12px;border-radius:6px;cursor:pointer;font-size:11px;transition:.15s;line-height:1.5;backdrop-filter:blur(4px)}
.msg-actions button:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.edit-ta{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px;color:#e0e0e0;font-size:13px;resize:none;outline:none;min-height:60px;font-family:inherit;box-sizing:border-box}
.edit-actions{display:flex;gap:6px;margin-top:6px}
.edit-confirm{padding:4px 14px;border:none;border-radius:8px;background:#6366f1;color:#fff;cursor:pointer;font-size:12px;height:30px}
.edit-cancel{padding:4px 14px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);cursor:pointer;font-size:12px}

/* ===== 输入栏 ===== */
.input-bar{padding:0 0 20px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.input-container{width:100%;max-width:900px;padding:0 40px}
.input-wrap{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 16px;display:flex;flex-direction:column;transition:.2s}
.input-wrap:focus-within{border-color:rgba(99,102,241,.35);box-shadow:0 0 0 1px rgba(99,102,241,.08)}
.input-wrap textarea{flex:1;border:none;background:transparent;color:#e0e0e0;font-size:14px;resize:none;outline:none;font-family:inherit;min-height:24px;max-height:160px;line-height:1.6;padding:4px 0 4px 12px}
.input-wrap textarea::placeholder{color:rgba(255,255,255,.2)}
.input-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:8px}
.input-bottom .left{display:flex;gap:6px;align-items:center}
.input-bottom .left button{background:none;border:none;color:rgba(255,255,255,.3);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:13px;transition:.15s;line-height:1}
.input-bottom .left button:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5)}
.input-bottom .left .dark-btn{font-size:16px;padding:4px 6px}
.input-bottom .left .think-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.35);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;transition:.15s;white-space:nowrap}
.input-bottom .left .think-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.55)}
.input-bottom .left .think-btn.on{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.2);color:#818cf8}
body.light-mode .think-btn{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.35)}
body.light-mode .think-btn:hover{background:rgba(0,0,0,.06);color:rgba(0,0,0,.55)}
body.light-mode .think-btn.on{background:rgba(99,102,241,.08);border-color:rgba(99,102,241,.15);color:#6366f1}
.input-bottom .right{display:flex;gap:6px;align-items:center}
.send-btn{width:34px;height:34px;border:none;border-radius:50%;background:#6366f1;color:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.15;cursor:default}
.send-btn.inactive{opacity:.25;cursor:default}
.input-tools{display:flex;gap:6px;align-items:center;padding:6px 4px 0}
.input-tools button{background:none;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.25);padding:3px 10px;border-radius:8px;cursor:pointer;font-size:11px;transition:.15s}
.input-tools button:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5)}
.footer-text{text-align:center;padding:8px 0 0;font-size:11px;color:rgba(255,255,255,.15)}
.empty-state{text-align:center;padding:120px 40px;color:rgba(255,255,255,.1)}
.empty-state .icon{font-size:56px;margin-bottom:16px}
.empty-state p{font-size:14px;line-height:2;color:rgba(255,255,255,.12)}

@media(max-width:768px){
  .sidebar{display:none}
  .main{max-width:100%}
  .msg{padding:0 16px;max-width:100%}
  .input-container{padding:0 16px}
  .sidebar.open{display:flex;position:fixed;top:0;left:0;bottom:0;z-index:100;width:300px}
}
</style></head><body>
<div class=sidebar id=sidebar>
  <div class=hd>
    <span class=logo>OpenCode</span>
    <button class=sidebar-collapse onclick=toggleSidebar() title=收起>‹</button>
  </div>
  <input id=sessionSearch placeholder="搜索对话...">
  <button class=btn-new onclick=newChat()>+ 开启新对话</button>
  <div class=title>对话历史</div>
  <div style="overflow-y:auto;flex:1" id=sessionList></div>
  <div class=sidebar-footer>
    <div class=avatar>U</div>
    <span class=uname id=userName>用户</span>
    <button onclick="document.getElementById('sessionSearch').focus()" title=搜索 style="background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:16px;padding:4px;border-radius:6px;transition:.15s;margin-left:auto">🔍</button>
  </div>
</div>

<button class=sidebar-open-btn onclick=toggleSidebar()>☰</button>

<div id=navBar class=nav-bar>
  <div class=nav-dots id=navDots></div>
  <div class=nav-preview id=navPreview style=display:none></div>
</div>

<div class=main>
  <div id=msgArea>
    <div class=empty-state><div class=icon>💬</div><p>开始对话</p></div>
  </div>
  <div class=input-bar>
    <div class=input-container>
      <div class=input-wrap>
        <textarea id=input rows=1 placeholder="给 AI 发送消息" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}else if(event.key=='ArrowUp'){event.preventDefault();if(histIdx<msgHistory.length-1){histIdx++;document.getElementById('input').value=msgHistory[msgHistory.length-1-histIdx]}}else if(event.key=='ArrowDown'){event.preventDefault();if(histIdx>0){histIdx--;document.getElementById('input').value=msgHistory[msgHistory.length-1-histIdx]}else{histIdx=-1;document.getElementById('input').value=''}}"></textarea>
        <div class=input-bottom>
          <div class=left>
            <select id=modelSelect onchange=switchModel(this.value) style="background:rgba(255,255,255,.06);color:var(--text,#e0e0e0);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:3px 8px;font-size:14px;cursor:pointer;outline:none;max-width:150px;transition:.15s"></select>
            <button class=think-btn id=thinkBtn onclick=cycleMode()>⚡ 快速</button>
            <button class=dark-btn onclick=toggleDark() id=darkBtn title="深色模式">🌙</button>
          </div>
          <div class=right>
            <button class=send-btn onclick="if(currentAbort){currentAbort.abort()}else{send()}">➤</button>
          </div>
        </div>
      </div>
      <div class=footer-text>内容由 AI 生成，请仔细甄别</div>
    </div>
    <input type=file id=fileInput multiple onchange=uploadFiles(this.files) style=display:none>
  </div>
</div>

<script>
var T=localStorage.getItem('auth_token');if(!T)location.href='/login.html'
var H={Authorization:'Bearer '+T},curSession=null,chatMode='chat',modelName='',uName='用户',currentAbort=null,msgHistory=[],histIdx=-1,isSending=0
function now(){var d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.toTimeString().slice(0,8)}
function cycleMode(){
  chatMode=chatMode==='chat'?'think':'chat'
  document.getElementById('thinkBtn').textContent=chatMode==='think'?'🧠 深度思考':'⚡ 快速'
  document.getElementById('thinkBtn').classList.toggle('on',chatMode==='think')
}

async function loadModels(){
  var sel=document.getElementById('modelSelect');if(!sel)return
  var r=await fetch('/auth/api/chat/models',{headers:H});var d=await r.json()
  if(!d.success||!d.models)return
  sel.innerHTML=''
  d.models.forEach(function(m){var o=document.createElement('option');o.value=m.id;o.textContent=m.name;sel.appendChild(o)})
  sel.value=modelName||'deepseek-v4-flash-free'
}
async function switchModel(mid){
  modelName=mid
  if(curSession)await fetch('/auth/api/chat/sessions/'+curSession+'/model',{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
}
async function newChat(){
  var mid=document.getElementById('modelSelect')?document.getElementById('modelSelect').value:''
  var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
  var d=await r.json();if(d.success){curSession=d.id;selectSession(d.id)}
}
async function selectSession(sid){curSession=sid;loadSessions();loadMessages()}

async function loadSessions(){
  var r=await fetch('/auth/api/chat/sessions',{headers:H});var d=await r.json()
  var today=[],yesterday=[],week=[],older=[]
  var now=new Date(),td=now.toDateString(),yd=new Date(now-864e5).toDateString()
  d.sessions.forEach(function(s){
    var dt=new Date(s.created);var dts=dt.toDateString()
    if(dts===td)today.push(s)
    else if(dts===yd)yesterday.push(s)
    else if(now-dt<6048e5)week.push(s)
    else older.push(s)
  })
  function renderGroup(label,items){return items.length?'<div class=session-group><div class=group-label>'+label+'</div>'+items.map(function(s){var c=s.id===curSession?' active':'';return'<div class="session'+c+'" onclick="selectSession(\''+s.id+'\')"><span>'+esc(s.title||'新对话')+'</span><button class=del onclick="event.stopPropagation();delSession(\''+s.id+'\')">×</button></div>'}).join('')+'</div>':''}
  document.getElementById('sessionList').innerHTML=renderGroup('今天',today)+renderGroup('昨天',yesterday)+renderGroup('7天内',week)+renderGroup('30天内',older)
  applySearch()
}
function applySearch(){
  var q=document.getElementById('sessionSearch').value.toLowerCase()
  document.querySelectorAll('#sessionList .session').forEach(function(s){
    s.style.display=q&&!s.textContent.toLowerCase().includes(q)?'none':''
  })
}
document.getElementById('sessionSearch').addEventListener('input',applySearch)
async function delSession(sid){
  await fetch('/auth/api/chat/sessions/'+sid,{method:'DELETE',headers:H})
  if(curSession===sid){curSession=null;document.getElementById('msgArea').innerHTML='<div class=empty-state><div class=icon>💬</div><p>开始对话</p></div>'}
  loadSessions()
}

async function loadMessages(){if(!curSession)return;var r=await fetch('/auth/api/chat/sessions/'+curSession+'/messages',{headers:H});var d=await r.json()
var el=document.getElementById('msgArea');if(!d.messages.length){el.innerHTML='<div class=empty-state><div class=icon>💬</div><p>开始对话</p></div>';return}
uName=d.username||uName;document.getElementById('userName').textContent=uName
el.innerHTML=d.messages.map(function(m,i){
  var label=m.role==='user'?esc(d.username):(d.model||'AI').split('-')[0]
  var meta=label+' · '+m.time
  var html='<div class="msg '+m.role+'">'+formatContent(m.content||'',m.thinking||'',m.role,meta)
  if(m.role==='user')html+='<div class=msg-actions><button onclick=copyMsg(this)>📋 复制</button><button onclick=editMsg(this)>✏️ 修改</button></div>'
  return html+'</div>'
}).join('');el.scrollTop=el.scrollHeight;modelName=d.model||'AI';updateNav()
var sel=document.getElementById('modelSelect');if(sel)sel.value=modelName}

async function send(){
  var input=document.getElementById('input'),text=input.value.trim();if(!text||isSending)return
  msgHistory.push(text);histIdx=-1;isSending++
  input.value='';if(!curSession){var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:H});var d=await r.json();curSession=d.id;loadSessions()}
  input.style.height='auto';document.querySelector('.send-btn').disabled=true
  var sendText=chatMode==='think'?'<think>逐步思考</think>'+text:text
  var el=document.getElementById('msgArea')
  if(el.querySelector('.empty-state'))el.innerHTML=''
  el.innerHTML+='<div class="msg user">'+formatContent(text,'','user','我 · '+now())+'<div class=msg-actions><button onclick=copyMsg(this)>📋 复制</button><button onclick=editMsg(this)>✏️ 修改</button></div></div>'
  var aiDiv=document.createElement('div');aiDiv.className='msg assistant';aiDiv.innerHTML='<div class=meta>'+(modelName||'AI').split('-')[0]+' · '+now()+'</div><div class="bubble thinking">思考中</div>';el.appendChild(aiDiv);el.scrollTop=el.scrollHeight;updateNav()
  try{
    var ctrl=new AbortController();var tmr=setTimeout(function(){currentAbort=null;ctrl.abort()},35000)
    currentAbort=ctrl;document.querySelector('.send-btn').textContent='⏹';document.querySelector('.send-btn').disabled=false
    var r=await fetch('/auth/api/chat/sessions/'+curSession+'/send',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({content:sendText}),signal:ctrl.signal})
    clearTimeout(tmr)
    if(!r.ok){var t=await r.text().catch(function(){return''});aiDiv.innerHTML='<div class=bubble>❌ '+r.status+': '+esc(t.slice(0,60))+'</div>';return}
    var d=await r.json()
    if(d.content||d.thinking){var _m=(modelName||'AI').split('-')[0]+' · '+now();aiDiv.outerHTML='<div class="msg assistant">'+formatContent(d.content||'',d.thinking||'','assistant',_m)+'</div>'}else{aiDiv.innerHTML='<div class=bubble>'+(d.error?'❌ '+esc(d.error):'(无回复)')+'</div>'}
    el.scrollTop=el.scrollHeight;loadSessions()
  }catch(e){
    if(e.name==='AbortError'&&currentAbort){aiDiv.outerHTML='<div class=interrupted><span></span>已中断<span></span></div>'}
    else aiDiv.innerHTML='<div class=bubble>❌ '+(e.name==='AbortError'?'请求超时，请重试':esc(e.message))+'</div>'
  }
  finally{clearTimeout(tmr);currentAbort=null;isSending=0;document.querySelector('.send-btn').textContent='➤';document.querySelector('.send-btn').disabled=false}
}
async function sendText(text){
  if(!text||isSending)return
  msgHistory.push(text);histIdx=-1;isSending++
  if(!curSession){var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:H});var d=await r.json();curSession=d.id;loadSessions()}
  var txt=chatMode==='think'?'<think>逐步思考</think>'+text:text
  var el=document.getElementById('msgArea'),aiDiv
  if(el.querySelector('.empty-state'))el.innerHTML=''
  el.innerHTML+='<div class="msg user">'+formatContent(text,'','user','我 · '+now())+'<div class=msg-actions><button onclick=copyMsg(this)>📋 复制</button><button onclick=editMsg(this)>✏️ 修改</button></div></div>'
  aiDiv=document.createElement('div');aiDiv.className='msg assistant';aiDiv.innerHTML='<div class=meta>'+(modelName||'AI').split('-')[0]+' · '+now()+'</div><div class="bubble thinking">思考中</div>';el.appendChild(aiDiv);el.scrollTop=el.scrollHeight
  document.querySelector('.send-btn').disabled=true
  try{
    var ctrl=new AbortController();var tmr=setTimeout(function(){currentAbort=null;ctrl.abort()},35000)
    currentAbort=ctrl;document.querySelector('.send-btn').textContent='⏹';document.querySelector('.send-btn').disabled=false
    var r=await fetch('/auth/api/chat/sessions/'+curSession+'/send',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({content:txt}),signal:ctrl.signal})
    clearTimeout(tmr)
    if(!r.ok){var t=await r.text().catch(function(){return''});aiDiv.innerHTML='<div class=bubble>❌ '+r.status+': '+esc(t.slice(0,60))+'</div>';return}
    var d=await r.json()
    if(d.content||d.thinking){aiDiv.outerHTML='<div class="msg assistant">'+formatContent(d.content||'',d.thinking||'','assistant')+'</div>'}else{aiDiv.innerHTML='<div class=bubble>'+(d.error?'❌ '+esc(d.error):'(无回复)')+'</div>'}
    el.scrollTop=el.scrollHeight;loadSessions()
  }catch(e){
    if(e.name==='AbortError'&&currentAbort){aiDiv.outerHTML='<div class=interrupted><span></span>已中断<span></span></div>'}
    else aiDiv.innerHTML='<div class=bubble>❌ '+(e.name==='AbortError'?'请求超时，请重试':esc(e.message))+'</div>'
  }
  finally{clearTimeout(tmr);currentAbort=null;isSending=0;document.querySelector('.send-btn').textContent='➤';document.querySelector('.send-btn').disabled=false}
}

function formatContent(txt, thinking, role, meta){
  if(!thinking&&role!='user'){
    var tm=txt.match(/<think>([\s\S]*?)<\/think>/)
    if(tm){
      var before=txt.slice(0,txt.indexOf('<think>')).trim()
      var after=txt.slice(txt.indexOf('</think>')+8).trim()
      var tc=tm[1].trim()
      if(before&&tc.startsWith(before))tc=tc.slice(before.length).trim()
      thinking=(before?before+'\n\n':'')+tc
      txt=after
    }
  }
  var mainText=txt
  var sm=mainText.match(/([\s\S]*?)\n[=\-]{3,}\n([\s\S]*)/)
  if(sm&&!thinking){thinking=sm[1];mainText=sm[2].trim()}
  if(!thinking&&chatMode==='think'&&txt.length>100&&role!='user'){thinking=txt;mainText=''}
  var html=meta?'<div class=meta>'+meta+'</div>':''
  if(thinking)html+='<details class=think-wrap><summary>🤔 思考过程</summary><div class=think-content>'+esc(thinking)+'</div></details>'
  if(role=='user')html+='<div class=bubble>'+(mainText?esc(mainText):'')+'</div>'
  else html+='<div class=bubble>'+(mainText?md(esc(mainText)):'')+'</div>'
  return html
}

function copyMsg(btn){
  var txt=btn.closest('.msg').querySelector('.bubble').textContent
  // 兼容 HTTP 环境：创建临时 textarea 复制
  var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select()
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(ta)
  btn.textContent='✓ 已复制';setTimeout(function(){btn.textContent='📋 复制'},1500)
}
function editMsg(btn){
  var msg=btn.closest('.msg'),bubble=msg.querySelector('.bubble')
  if(!msg._orig)msg._orig=bubble.textContent
  bubble.innerHTML='<textarea class=edit-ta>'+esc(msg._orig)+'</textarea><div class=edit-actions><button class=edit-confirm onclick=confirmEdit(this)>确认</button><button class=edit-cancel onclick=cancelEdit(this)>取消</button></div>'
}
function confirmEdit(btn){
  var msg=btn.closest('.msg'),text=msg.querySelector('textarea').value.trim()
  if(text){msg.remove();sendText(text)}else cancelEdit(btn)
}
function cancelEdit(btn){
  var msg=btn.closest('.msg'),bubble=msg.querySelector('.bubble')
  bubble.innerHTML=esc(msg._orig||'')
}
function toggleSidebar(){document.body.classList.toggle('sidebar-hidden')}
function toggleDark(){
  document.body.classList.toggle('light-mode')
  var btn=document.getElementById('darkBtn')
  var isLight=document.body.classList.contains('light-mode')
  btn.textContent=isLight?'☀️':'🌙'
  localStorage.setItem('theme',isLight?'light':'dark')
}
// 右侧导航栏
function updateNav(){
  var dots=document.getElementById('navDots');dots.innerHTML=''
  var msgs=document.querySelectorAll('#msgArea .msg.user')
  if(!msgs.length){var e=document.createElement('div');e.className='nav-dot';e.style.opacity='.15';dots.appendChild(e);return}
  msgs.forEach(function(m,i){
    var d=document.createElement('div');d.className='nav-dot'
    d.dataset.idx=i
    d.onclick=function(){msgs[+this.dataset.idx].scrollIntoView({behavior:'smooth',block:'center'})}
    dots.appendChild(d)
  })
  var all=dots.querySelectorAll('.nav-dot')
  if(all.length)all[all.length-1].classList.add('active')
}
// 导航栏事件委托：hover 圆点显示对应消息预览
document.getElementById('navBar').addEventListener('mouseover',function(e){
  var dot=e.target.closest('.nav-dot');if(!dot)return
  var idx=+dot.dataset.idx
  var msgs=document.querySelectorAll('#msgArea .msg.user')
  if(msgs[idx])showNavPreview(msgs[idx].querySelector('.bubble').textContent)
})
document.getElementById('navBar').addEventListener('mouseleave',function(){
  setTimeout(function(){
    if(!document.getElementById('navBar').matches(':hover'))document.getElementById('navPreview').style.display='none'
  },300)
})
async function uploadFiles(files){for(var i=0;i<files.length;i++){var fd=new FormData();fd.append('file',files[i]);await fetch('/auth/api/upload',{method:'POST',headers:H,body:fd})}loadMessages()}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function copyCode(btn){
  var ta=document.createElement('textarea')
  ta.value=btn.parentElement.querySelector('pre code').textContent
  ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select()
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(ta)
  btn.textContent='✓';setTimeout(function(){btn.textContent='📋'},1500)
}
function md(s){
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,'<div class=code-wrap><button class=copy-btn onclick=copyCode(this)>📋</button><pre><code class="lang-$1">$2</code></pre></div>')
       .replace(/`([^`]+)`/g,'<code>$1</code>')
       .replace(/^(\d+)\.\s(.+)$/gm,'<div class=md-step><span class=step-num>$1</span><span class=step-text>$2</span></div>')
       .replace(/^### (.+)$/gm,'<h4>$1</h4>')
       .replace(/^## (.+)$/gm,'<h3>$1</h3>')
       .replace(/^# (.+)$/gm,'<h2>$1</h2>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/^- (.+)$/gm,'<div class=md-li>$1</div>')
  return s
}
loadModels();loadSessions();(async function(){await newChat()})();
// 输入检测: 空内容时发送按钮置灰
var _input=document.getElementById('input')
_input.addEventListener('input',function(){
  document.querySelector('.send-btn').classList.toggle('inactive',!this.value.trim())
})
_input.dispatchEvent(new Event('input'))
// 初始化主题
if(localStorage.getItem('theme')==='light'){document.body.classList.add('light-mode');document.getElementById('darkBtn').textContent='☀️'}
</script></body></html>
