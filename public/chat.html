<!DOCTYPE html><html lang=zh-CN><head>
<meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AI 智能对话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f5;--bg2:#fff;--bg3:#fafafa;--text:#1a1a2e;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.04);--shadow:0 1px 6px rgba(0,0,0,.04);
  --primary:#6366f1;--primary2:#818cf8;--accent:#7c3aed;
  --bubble-assist:#fff;--scrollbar:rgba(0,0,0,.08);
  --think-bg:linear-gradient(135deg,rgba(99,102,241,.06),rgba(139,92,246,.03));
  --think-border:rgba(99,102,241,.4);--think-color:#6366f1;--think-text:#555;
  --input-bg:#fff;--input-border:rgba(0,0,0,.1);--input-shadow:rgba(99,102,241,.08);
  --code-bg:#f0f0f0;--code-border:rgba(0,0,0,.06);--code-color:#6366f1;
  --hl-bg:rgba(99,102,241,.06);--hl-color:#6366f1;
  --empty:rgba(0,0,0,.1)
}
.dark-mode{
  --bg:#0f1729;--bg2:#0b1120;--bg3:#0d1325;--text:#e2e8f0;--text2:rgba(255,255,255,.55);--text3:rgba(255,255,255,.25);
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.04);--shadow:0 1px 6px rgba(0,0,0,.15);
  --bubble-assist:rgba(255,255,255,.07);
  --scrollbar:rgba(255,255,255,.1);
  --think-bg:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.04));
  --think-border:rgba(99,102,241,.5);--think-color:#818cf8;--think-text:rgba(255,255,255,.55);
  --input-bg:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.1);--input-shadow:rgba(99,102,241,.1);
  --code-bg:rgba(0,0,0,.35);--code-border:rgba(255,255,255,.06);--code-color:#a5b4fc;
  --hl-bg:rgba(99,102,241,.12);--hl-color:#818cf8;
  --empty:rgba(255,255,255,.15)
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
.sidebar .hd{padding:16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.sidebar .hd button{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn-new{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff}
.btn-new:hover{opacity:.9;transform:translateY(-1px)}
.btn-model{background:var(--border2);color:var(--text3)}
.btn-model.active{background:var(--hl-bg);color:var(--hl-color);box-shadow:inset 0 0 0 1px var(--primary2)}
.btn-model:hover{background:var(--border)}
.sidebar .title{padding:12px 16px 8px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.session{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text3);display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;transition:.1s;margin:1px 0}
.session:hover{background:var(--hl-bg);color:var(--text)}
.session.active{background:var(--hl-bg);border-left-color:var(--primary);color:var(--text)}
.session .del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;visibility:hidden}
.session:hover .del{visibility:visible}
.session .del:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.main{flex:1;display:flex;flex-direction:column;height:100vh;max-width:calc(100% - 280px)}
.chat-header{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg2)}
.chat-header h2{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.chat-header .actions{display:flex;gap:4px;align-items:center}
.chat-header .actions button{background:none;border:1px solid var(--border);color:var(--text3);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
.chat-header .actions button:hover{background:var(--hl-bg);color:var(--text);border-color:var(--border)}
.dark-toggle{cursor:pointer;font-size:16px;background:none;border:none;padding:4px 8px;border-radius:6px;transition:.15s;color:var(--text2)}
.dark-toggle:hover{background:var(--hl-bg)}
#modelSelect{background:var(--hl-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;outline:none}
#modelSelect option{background:var(--bg2);color:var(--text)}
#msgArea{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth;background:var(--bg)}
#msgArea::-webkit-scrollbar{width:4px}
#msgArea::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.msg{max-width:80%;margin-bottom:8px;animation:fadeIn .3s}
.msg .meta{font-size:11px;color:var(--text3);margin-bottom:4px}
.msg.user .meta{text-align:right}
.msg.user{margin-left:auto}
.msg .bubble{width:fit-content;padding:10px 18px;border-radius:14px;font-size:14px;line-height:1.7;text-align:left;word-break:break-word}
.msg.user .bubble{margin-left:auto}
.msg.assistant .bubble{margin-right:auto;max-width:75%}
.msg.user .bubble{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 12px rgba(99,102,241,.25)}
.msg.assistant .bubble{background:var(--bubble-assist);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);box-shadow:var(--shadow);white-space:pre-wrap}
.msg.assistant .bubble h2{font-size:16px;font-weight:700;color:var(--text);margin:0 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.msg.assistant .bubble h3{font-size:15px;font-weight:600;color:var(--text);margin:0 0 6px}
.msg.assistant .bubble h4{font-size:14px;font-weight:600;color:var(--text2);margin:0 0 4px}
.msg.assistant .bubble strong{color:var(--text)}
.msg.assistant .bubble .md-li{padding-left:12px;margin:2px 0;color:var(--text2)}
.msg.assistant .bubble .md-li::before{content:'• ';color:var(--text3)}
.msg.assistant .bubble pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:8px;padding:12px 14px;margin:8px 0;overflow-x:auto;white-space:pre}
.msg.assistant .bubble code{font-family:'JetBrains Mono','Fira Code','Consolas',monospace;font-size:12px;line-height:1.5;color:var(--code-color)}
.msg.assistant .bubble :not(pre)>code{background:var(--hl-bg);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--hl-color)}
.msg.assistant .bubble.thinking{background:transparent;border:none;box-shadow:none;color:var(--text3);font-size:13px;padding:4px 0}
.msg.assistant .bubble.thinking::after{content:'';display:inline-block;width:4px;height:4px;background:var(--primary2);border-radius:50%;margin-left:4px;animation:dotPulse 1.2s infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ===== 思维链(可折叠) ===== */
.think-wrap{background:var(--think-bg);border-left:3px solid var(--think-border);border-radius:0 12px 12px 0;margin-bottom:8px;overflow:hidden}
.think-wrap summary{list-style:none;cursor:pointer;padding:10px 14px 8px;font-size:12px;font-weight:600;color:var(--think-color);display:flex;align-items:center;gap:8px;letter-spacing:.3px;transition:.15s;user-select:none}
.think-wrap summary::-webkit-details-marker{display:none}
.think-wrap summary::before{content:'✦';font-size:10px;opacity:.6}
.think-wrap summary::after{content:'▾';margin-left:auto;font-size:10px;transition:transform .2s;opacity:.5}
.think-wrap[open] summary::after{transform:rotate(180deg)}
.think-wrap[open] .think-content{border-top:1px solid var(--think-border)}
.think-content{padding:10px 14px;font-size:13px;color:var(--think-text);line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto;font-style:italic}

/* ===== 输入栏 ===== */
.input-bar{padding:8px 16px 12px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.input-wrap{display:flex;gap:10px;align-items:flex-end;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:16px;padding:4px 4px 4px 18px;transition:.2s;backdrop-filter:blur(12px)}
.input-wrap:focus-within{border-color:var(--primary2);background:var(--input-bg);box-shadow:0 0 0 4px var(--input-shadow)}
.input-wrap textarea{flex:1;border:none;background:transparent;color:var(--text);font-size:14px;resize:none;outline:none;font-family:inherit;min-height:24px;max-height:120px;line-height:1.5;padding:8px 0}
.input-wrap textarea::placeholder{color:var(--text3)}
.input-wrap .tool-btn{background:none;border:none;color:var(--text3);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center}
.input-wrap .tool-btn:hover{color:var(--hl-color);background:var(--hl-bg)}
.input-wrap .send-btn{padding:8px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;cursor:pointer;font-size:13px;font-weight:600;flex-shrink:0;transition:.15s;height:38px}
.input-wrap .send-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 15px rgba(99,102,241,.3)}
.input-wrap .send-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.empty-state{text-align:center;padding:120px 40px;color:var(--empty)}
.empty-state .icon{font-size:56px;margin-bottom:16px}
.empty-state p{font-size:14px;line-height:2;color:var(--empty)}
@media(max-width:768px){
  .sidebar{display:none}
  .main{max-width:100%}
  .sidebar.open{display:flex;position:fixed;top:0;left:0;bottom:0;z-index:100;width:280px}
}
</style></head><body>

<div class=sidebar id=sidebar>
  <div class=hd>
    <button class="btn-new" onclick=newChat()>+ 新建</button>
    <button class="btn-model" id=btnNormal onclick="setMode('chat')">💬 对话</button>
    <button class="btn-model" id=btnThink onclick="setMode('think')">🧠 思考</button>
  </div>
  <div class=title>📋 对话历史</div>
  <div style="overflow-y:auto;flex:1" id=sessionList></div>
</div>

<div class=main>
  <div class=chat-header>
    <h2 id=chatTitle>🤖 AI 智能对话</h2>
    <div class=actions>
      <button class=dark-toggle onclick=toggleDark() id=darkBtn>☀️</button>
      <select id=modelSelect onchange=switchModel(this.value)></select>
      <button onclick="document.getElementById('fileInput').click()" title="上传文件">📎 文件</button>
      <button onclick=loadMessages() title="刷新">🔄 刷新</button>
    </div>
  </div>
  <div id=msgArea>
    <div class=empty-state><div class=icon>💬</div><p>选择或新建一个对话<br>输入消息即可开始</p></div>
  </div>
  <div class=input-bar>
    <div class=input-wrap>
      <textarea id=input rows=1 placeholder="输入消息..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class=tool-btn onclick="document.getElementById('fileInput').click()" title=上传>📎</button>
      <button class=send-btn onclick=send()>发送</button>
    </div>
    <input type=file id=fileInput multiple onchange=uploadFiles(this.files) style=display:none>
  </div>
</div>

<script>
var T=localStorage.getItem('auth_token');if(!T)location.href='/login.html'
var H={Authorization:'Bearer '+T},curSession=null,chatMode='chat',modelName='AI'
function now(){var d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.toTimeString().slice(0,8)}

function setMode(m){chatMode=m;document.getElementById('btnNormal').classList.toggle('active',m==='chat');document.getElementById('btnThink').classList.toggle('active',m==='think')}

async function loadModels(){
  var names={'deepseek-v4-flash-free':'DeepSeek V4','hy3-free':'Hy3','north-mini-code-free':'North Mini','nemotron-3-ultra-free':'Nemotron 3','mimo-v2.5-free':'MiMo V2.5','big-pickle':'Big Pickle','ling-2.6-flash-free':'Ling 2.6','minimax-m3-free':'MiniMax M3'}
  var sel=document.getElementById('modelSelect');if(!sel)return
  var r=await fetch('/auth/api/chat/models',{headers:H})
  var d=await r.json()
  if(!d.success||!d.models)return
  sel.innerHTML=''
  d.models.forEach(function(m){
    var o=document.createElement('option')
    o.value=m.id;o.textContent=names[m.id]||m.name;sel.appendChild(o)
  })
  sel.value=modelName||'deepseek-v4-flash-free'
}
async function switchModel(mid){
  modelName=mid
  if(curSession)await fetch('/auth/api/chat/sessions/'+curSession+'/model',{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
}
async function newChat(){
  var mid=document.getElementById('modelSelect')?document.getElementById('modelSelect').value:''
  var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({model:mid})})
  var d=await r.json();if(d.success){curSession=d.id;selectSession(d.id)}
}

async function selectSession(sid){curSession=sid;loadSessions();loadMessages()}

async function loadSessions(){var r=await fetch('/auth/api/chat/sessions',{headers:H});var d=await r.json()
document.getElementById('sessionList').innerHTML=d.sessions.map(function(s){var c=s.id===curSession?' active':'';return'<div class="session'+c+'" onclick="selectSession(\''+s.id+'\')"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.title||'新对话')+'</span><button class=del onclick="event.stopPropagation();delSession(\''+s.id+'\')">×</button></div>'}).join('')}

async function delSession(sid){await fetch('/auth/api/chat/sessions/'+sid,{method:'DELETE',headers:H});if(curSession===sid){curSession=null;document.getElementById('msgArea').innerHTML='<div class=empty-state><div class=icon>💬</div><p>选择或新建一个对话</p></div>'}loadSessions()}

async function loadMessages(){if(!curSession)return;var r=await fetch('/auth/api/chat/sessions/'+curSession+'/messages',{headers:H});var d=await r.json()
var el=document.getElementById('msgArea');if(!d.messages.length){el.innerHTML='<div class=empty-state><div class=icon>💬</div><p>开始对话</p></div>';return}
document.getElementById('chatTitle').textContent=d.messages[0]?d.messages[0].content.slice(0,20)+'…':'对话'
el.innerHTML=d.messages.map(function(m){
  var label=m.role==='user'?esc(d.username):(d.model||'AI').split('-')[0]
  return '<div class="msg '+m.role+'"><div class=meta>'+label+' · '+m.time+'</div>'+formatContent(m.content||'',m.thinking||'')+'</div>'
}).join('');el.scrollTop=el.scrollHeight;modelName=d.model||'AI'
var sel=document.getElementById('modelSelect');if(sel)sel.value=modelName}

async function send(){
  var input=document.getElementById('input'),text=input.value.trim();if(!text)return
  input.value='';if(!curSession){var r=await fetch('/auth/api/chat/sessions',{method:'POST',headers:H});var d=await r.json();curSession=d.id;loadSessions()}
  input.style.height='auto';document.querySelector('.send-btn').disabled=true
  var sendText=chatMode==='think'?'<think>逐步思考</think>'+text:text
  var el=document.getElementById('msgArea')
  var u=document.getElementById('userInfo')
  if(el.querySelector('.empty-state'))el.innerHTML=''
  el.innerHTML+='<div class="msg user"><div class=meta>'+(u?esc(u.textContent):'我')+' · '+now()+'</div><div class=bubble>'+esc(text)+'</div></div>'
  var aiDiv=document.createElement('div');aiDiv.className='msg assistant';aiDiv.innerHTML='<div class=meta>'+(modelName||'AI').split('-')[0]+' · '+now()+'</div><div class="bubble thinking">思考中</div>';el.appendChild(aiDiv);el.scrollTop=el.scrollHeight
  // 等待后端回复
  try{
    var ctrl=new AbortController();setTimeout(function(){ctrl.abort()},35000)
    var r=await fetch('/auth/api/chat/sessions/'+curSession+'/send',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},H),body:JSON.stringify({content:sendText}),signal:ctrl.signal})
    if(!r.ok){var t=await r.text().catch(function(){return''});aiDiv.innerHTML='<div class=bubble>❌ '+r.status+': '+esc(t.slice(0,60))+'</div>';return}
    var d=await r.json()
    if(d.content||d.thinking){var b=aiDiv.querySelector('.bubble');b.outerHTML=formatContent(d.content||'',d.thinking||'')}else{var b=aiDiv.querySelector('.bubble');b.outerHTML='<div class=bubble>'+(d.error?'❌ '+esc(d.error):'(无回复)')+'</div>'}
    el.scrollTop=el.scrollHeight;loadSessions()
  }catch(e){aiDiv.innerHTML='<div class=bubble>❌ '+esc(e.message)+'</div>'}
  finally{document.querySelector('.send-btn').disabled=false}
}

function formatContent(txt, thinking){
  // 旧消息：从 content 里提取 think 标签
  if(!thinking){
    var tm=txt.match(/<think>([\s\S]*?)<\/think>/)
    if(tm){
      var before=txt.slice(0,txt.indexOf('<think>')).trim()
      var after=txt.slice(txt.indexOf('</think>')+8).trim()
      var tc=tm[1].trim()
      if(before&&tc.startsWith(before))tc=tc.slice(before.length).trim()
      thinking=(before?before+'\n\n':'')+tc
      txt=after
    }
  }
  var mainText=txt
  var sm=mainText.match(/([\s\S]*?)\n[=\-]{3,}\n([\s\S]*)/)
  if(sm&&!thinking){thinking=sm[1];mainText=sm[2].trim()}
  if(!thinking&&chatMode==='think'&&txt.length>100){thinking=txt;mainText=''}
  var html=''
  if(thinking)html='<details class=think-wrap><summary>🧠 思考过程</summary><div class=think-content>'+esc(thinking)+'</div></details>'
  html+='<div class=bubble>'+(mainText?md(esc(mainText)):'')+'</div>'
  return html
}

async function uploadFiles(files){for(var i=0;i<files.length;i++){var fd=new FormData();fd.append('file',files[i]);await fetch('/auth/api/upload',{method:'POST',headers:H,body:fd})}loadMessages()}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toggleDark(){
  var b=document.body;b.classList.toggle('dark-mode')
  var isDark=b.classList.contains('dark-mode')
  document.getElementById('darkBtn').textContent=isDark?'🌙':'☀️'
  localStorage.setItem('theme',isDark?'dark':'light')
}
// 初始化主题
(function(){
  var t=localStorage.getItem('theme')
  if(t==='dark'){document.body.classList.add('dark-mode');document.getElementById('darkBtn').textContent='🌙'}
})()
function md(s){
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code class="lang-$1">$2</code></pre>')
       .replace(/`([^`]+)`/g,'<code>$1</code>')
       .replace(/^### (.+)$/gm,'<h4>$1</h4>')
       .replace(/^## (.+)$/gm,'<h3>$1</h3>')
       .replace(/^# (.+)$/gm,'<h2>$1</h2>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/^- (.+)$/gm,'<div class=md-li>$1</div>')
  return s
}
setMode('chat');loadModels();loadSessions();(async function(){await newChat()})();
</script></body></html>
