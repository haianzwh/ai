<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 排行榜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#0f1729;color:#fff;min-height:100vh}
.h{background:rgba(99,102,241,.1);border-bottom:1px solid rgba(99,102,241,.2);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.h h1{font-size:20px}
.h nav a{color:rgba(255,255,255,.5);text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid rgba(255,255,255,.2);border-radius:6px;margin-left:8px}
.list{padding:24px;max-width:960px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:24px}
.tab{padding:8px 20px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:14px}
.tab.active{background:rgba(99,102,241,.2);border-color:#6366f1;color:#fff}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;text-align:center}
.card-val{font-size:26px;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card-label{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:12px;color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.1)}
td{padding:12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05)}
tr:hover td{background:rgba(255,255,255,.02)}
.rank{width:32px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.r1{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}
.r2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#000}
.r3{background:linear-gradient(135deg,#cd853f,#d2a679);color:#000}
.name{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block}
.row-me td{background:rgba(99,102,241,.12)!important}
.token{font-family:'SF Mono',monospace;text-align:right}
.load{text-align:center;padding:60px;color:rgba(255,255,255,.4)}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr)}.h h1{font-size:16px}.tab{padding:6px 12px;font-size:12px}th{font-size:10px}td{font-size:11px;padding:8px 6px}}
</style>
</head>
<body>
<div class="h"><h1>&#x1F3C6; 排行榜</h1><nav><a href="/">返回</a><a href="/upload.html">上传</a><a href="/projects.html">项目文件管理</a></nav></div>
<div class="list">
  <div class="tabs">
    <button class="tab active" id="tb-proj" onclick="load('projects')">&#x1F4CA; 项目排名</button>
    <button class="tab" id="tb-user" onclick="load('users')">&#x1F465; 人员排名</button>
    <span style="display:flex;align-items:center;margin-left:auto;gap:4px">
      <button class="tab active" id="tb-daily" onclick="changeType('daily')" style="font-size:12px">今日</button>
      <button class="tab" id="tb-all" onclick="changeType('all')" style="font-size:12px">累计</button>
    </span>
  </div>
  <div class="summary" id="sum"></div>
  <div id="rank"><div class="load">加载中...</div></div>
</div>
<script>
var T = localStorage.getItem('auth_token');
if(!T)location.href='/login.html';
var rankType = 'daily';

function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(n)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function rk(i){return i<3?'<span class="rank r'+(i+1)+'">'+(i+1)+'</span>':i+1}

function changeType(t){
  rankType = t;
  document.getElementById('tb-daily').classList.toggle('active', t==='daily');
  document.getElementById('tb-all').classList.toggle('active', t==='all');
  load('projects');
}

async function load(t){
  document.getElementById('tb-proj').classList.toggle('active',t==='projects');
  document.getElementById('tb-user').classList.toggle('active',t==='users');
  document.getElementById('rank').innerHTML='<div class="load">加载中...</div>';
  
  if(t==='projects'){
    var r=await fetch('/auth/api/stats/ranking?type='+rankType,{headers:{Authorization:'Bearer '+T}});
    var d=await r.json();
    var label = rankType==='daily' ? '今日' : '累计';
    document.getElementById('sum').innerHTML=[
      {v:fmt(d.totals.total),l:label+' Token'},
      {v:d.totals.sessions,l:label+'会话'},
      {v:fmt(d.totals.input),l:'输入'},
      {v:fmt(d.totals.output),l:'输出'}
    ].map(c=>'<div class="card"><div class="card-val">'+c.v+'</div><div class="card-label">'+c.l+'</div></div>').join('');
    document.getElementById('rank').innerHTML='<table><thead><tr><th>#</th><th>项目</th><th class="token">'+label+'Token</th><th class="token">输入</th><th class="token">输出</th><th class="token">会话</th></tr></thead><tbody>'+d.ranking.map((p,i)=>'<tr><td>'+rk(i)+'</td><td><span class="name">'+esc(p.name)+'</span></td><td class="token">'+fmt(p.total)+'</td><td class="token">'+fmt(p.input)+'</td><td class="token">'+fmt(p.output)+'</td><td class="token">'+p.sessions+'</td></tr>').join('')+'</tbody></table>';
  }else{
    var r=await fetch('/auth/api/stats/users',{headers:{Authorization:'Bearer '+T}});
    var d=await r.json();
    document.getElementById('sum').innerHTML=[
      {v:d.users.length,l:'注册用户'},
      {v:d.totalSessions,l:'会话数'},
      {v:fmt(d.totalTokens),l:'总Token'},
      {v:(d.totalTokens/Math.max(1,d.totalSessions)).toFixed(0),l:'平均/会话'}
    ].map(c=>'<div class="card"><div class="card-val">'+c.v+'</div><div class="card-label">'+c.l+'</div></div>').join('');
    document.getElementById('rank').innerHTML='<table><thead><tr><th>#</th><th>用户</th><th>邮箱</th><th>Token消耗</th><th>最后登录</th><th>状态</th></tr></thead><tbody>'+d.users.map((u,i)=>{
      var cls = u.isMe ? ' class="row-me"' : '';
      var st = u.isOnline ? '&#x1F7E2; 在线' : '&#x26AA; 离线';
      if(u.isMe) st = '&#x1F449; 我 ('+st+')';
      return '<tr'+cls+'><td>'+rk(i)+'</td><td><span class="name">'+esc(u.username)+'</span></td><td>'+esc(u.email||'-')+'</td><td class="token">'+fmt(u.totalTokens)+'</td><td>'+u.lastLogin+'</td><td>'+st+'</td></tr>';
    }).join('')+'</tbody></table>';
  }
}
load('projects');
</script>
</body>
</html>
