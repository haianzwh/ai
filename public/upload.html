<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#0f1729;color:#fff;min-height:100vh}
.h{background:rgba(99,102,241,.1);border-bottom:1px solid rgba(99,102,241,.2);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.h h1{font-size:18px}
.h nav a{color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;padding:6px 14px;border:1px solid rgba(255,255,255,.2);border-radius:6px;margin-left:8px}
.list{padding:20px;max-width:700px;margin:0 auto}

.upload{background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.15);border-radius:16px;padding:32px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:20px}
.upload:hover,.drag{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.08)}
.upload svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.upload p{color:rgba(255,255,255,.4);font-size:14px}
.upload .or{color:rgba(255,255,255,.2);font-size:12px;margin:8px 0}
.upload .btn{display:inline-block;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none}

.status{text-align:center;padding:12px;font-size:13px;border-radius:8px;margin-bottom:12px;display:none}
.status.err{background:rgba(239,68,68,.15);color:#ef4444;display:block}
.status.ok{background:rgba(34,197,94,.15);color:#22c55e;display:block}
.status.info{background:rgba(99,102,241,.15);color:#818cf8;display:block}

.file{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;margin-bottom:8px}
.file:nth-child(even){background:rgba(255,255,255,.02)}
.fn{flex:1;font-size:14px;color:rgba(255,255,255,.8);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.fm{font-size:11px;color:rgba(255,255,255,.25);white-space:nowrap;margin-right:8px}
.fd{color:#6366f1;text-decoration:none;font-size:13px;padding:4px 12px;border:1px solid rgba(99,102,241,.3);border-radius:6px;white-space:nowrap}
.fd:hover{background:rgba(99,102,241,.1)}
.del{color:#ef4444;cursor:pointer;font-size:13px;padding:4px 8px;border:none;background:none;white-space:nowrap}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:14px}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.3)}
#progress{width:100%;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:12px;display:none;overflow:hidden}
#progress div{height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);border-radius:2px;width:0;transition:width .3s}

input[type=file]{display:none}
@media(max-width:480px){
  .h h1{font-size:16px}
  .upload{padding:24px 12px;border-radius:12px}
  .upload svg{width:36px;height:36px}
  .upload p{font-size:13px}
  .upload .btn{padding:8px 20px;font-size:13px}
  .file{padding:10px 12px;gap:8px}
  .fn{font-size:12px}
  .fm{font-size:10px}
  .fd{padding:3px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="h">
  <h1>📂 文件管理</h1>
  <nav>
    <a href="/">首页</a>
    <a href="/projects.html">项目</a>
    <a href="/ranking.html">排行</a>
  </nav>
</div>
<div class="list">
  <div class="upload" id="dropZone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0L8 8m4-4l4 4M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2"/></svg>
    <p>点击或拖拽文件到此处上传</p>
    <div class="or">支持任意文件类型，单个最大 500MB</div>
    <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
    <input type="file" id="fileInput" multiple>
    <div id="progress"><div></div></div>
  </div>
  <div class="status" id="status"></div>
  <div id="fileList"><div class="loading">加载中...</div></div>
</div>
<script>
var T = localStorage.getItem('auth_token');
if (!T) { location.href = '/login.html'; }
var H = { Authorization: 'Bearer ' + T };

function showStatus(msg, cls) {
  var s = document.getElementById('status');
  s.textContent = msg; s.className = 'status ' + cls;
  setTimeout(function() { s.className = 'status'; }, 4000);
}

// 拖拽上传
var dz = document.getElementById('dropZone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('drag'); });
dz.addEventListener('drop', function(e) {
  e.preventDefault(); dz.classList.remove('drag');
  if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});
dz.addEventListener('click', function(e) {
  if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT')
    document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', function() {
  if (this.files.length) uploadFiles(this.files);
});

async function uploadFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    showStatus('上传中: ' + f.name + ' (' + fmtSize(f.size) + ')', 'info');
    
    var fd = new FormData();
    fd.append('file', f);
    
    try {
      var r = await fetch('/auth/api/upload', { method: 'POST', headers: H, body: fd });
      var d = await r.json();
      if (d.success) {
        showStatus('上传成功: ' + d.original + ' (' + fmtSize(d.size) + ')', 'ok');
      } else {
        showStatus('上传失败: ' + (d.error || d.message || '未知错误'), 'err');
      }
    } catch(e) {
      showStatus('网络错误: ' + e.message, 'err');
    }
  }
  loadFiles();
}

async function loadFiles() {
  try {
    var r = await fetch('/auth/api/uploads', { headers: H });
    var d = await r.json();
    var el = document.getElementById('fileList');
    
    if (!d.files.length) {
      el.innerHTML = '<div class="empty">还没有上传过文件</div>';
      return;
    }
    
    el.innerHTML = d.files.map(function(f) {
      return '<div class="file">' +
        '<span class="fn" title="' + esc(f.name) + '">' + esc(f.name) + '</span>' +
        '<span class="fm">' + f.time + '</span>' +
        '<span class="fm">' + fmtSize(f.size) + '</span>' +
        '<a class="fd" href="/auth/api/download/file?path=' + encodeURIComponent(f.path || '/tmp/opencode/generated_files/uploads/' + f.name) + '">下载</a>' +
        '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('fileList').innerHTML = '<div class="empty">加载失败</div>';
  }
}

function fmtSize(b) {
  return b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(1)+'KB' : (b/1048576).toFixed(1)+'MB';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadFiles();
</script>
</body>
</html>
