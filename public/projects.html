<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#0f1729;color:#fff;min-height:100vh}
.h{background:rgba(99,102,241,.1);border-bottom:1px solid rgba(99,102,241,.2);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.h h1{font-size:20px}
.h a{color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid rgba(255,255,255,.2);border-radius:6px}
.list{padding:24px;max-width:900px;margin:0 auto}
.item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin-bottom:12px;overflow:hidden}
.ih{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;transition:.2s}
.ih:hover{background:rgba(255,255,255,.06)}
.it{font-size:15px;font-weight:500}
.im{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px}
.ib{display:flex;gap:8px;flex-shrink:0;margin-left:12px;align-items:center}
.b{border:none;border-radius:6px;font-size:13px;cursor:pointer;text-decoration:none;transition:.2s;padding:6px 14px}
.bl{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;display:inline-block}
.bl:hover{transform:translateY(-1px)}
.be{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2)}
.files{display:none;border-top:1px solid rgba(255,255,255,.08);padding:12px 20px}
.files.open{display:block}
.file{display:flex;align-items:center;gap:12px;padding:10px 12px;margin:4px 0;background:rgba(255,255,255,.03);border-radius:8px}
.fn{font-size:13px;color:rgba(255,255,255,.7);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ft{font-size:11px;color:rgba(255,255,255,.25);white-space:nowrap;flex-shrink:0}
.fs{font-size:11px;color:rgba(255,255,255,.35);white-space:nowrap;flex-shrink:0;text-align:right;min-width:60px}
.fd{border:none;padding:4px 10px;font-size:12px;background:rgba(99,102,241,.2);color:#6366f1;border-radius:4px;cursor:pointer;text-decoration:none;flex-shrink:0}
.load{text-align:center;padding:60px;color:rgba(255,255,255,.4)}
.info{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:rgba(255,255,255,.7)}
</style>
</head>
<body>
<div class="h"><h1>&#x1F4C1; 项目管理</h1><a href="/">&#x2190; 返回</a></div>
<div class="list" id="list"><div class="load">加载中...</div></div>
<script>
var TOKEN = localStorage.getItem('auth_token');
if (!TOKEN) { location.href = '/login.html'; }

function authFetch(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  return fetch(url, opts);
}

async function load() {
  try {
    var res = await authFetch('/auth/api/projects');
    var data = await res.json();
    if (data.error) { alert(data.error); location.href='/login.html'; return }
    if (!data.projects.length) {
      document.getElementById('list').innerHTML = '<div class="load">暂无项目</div>';
      return;
    }
    document.getElementById('list').innerHTML = 
      '<div class="info">每个项目最多保存100个文件，超出自动覆盖旧文件</div>' +
      data.projects.map(function(p) {
        return '<div class="item">' +
          '<div class="ih" onclick="toggle(\''+p.id+'\')">' +
            '<div><div class="it">'+esc(p.title)+'</div><div class="im">'+esc(p.dir)+' · '+p.updated+'</div></div>' +
            '<div class="ib"><span class="b be expand">▾ 展开</span><a class="b bl" href="/auth/api/download/project/'+p.id+'" onclick="event.stopPropagation()">下载全部</a></div>' +
          '</div><div class="files" id="f-'+p.id+'"></div></div>';
      }).join('');
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="load">加载失败</div>';
  }
}

async function toggle(id) {
  var el = document.getElementById('f-'+id);
  if (el.classList.contains('open')) { el.classList.remove('open'); return }
  el.innerHTML = '<div style="padding:8px;color:rgba(255,255,255,.3)">加载...</div>';
  el.classList.add('open');
  try {
    var res = await authFetch('/auth/api/projects/'+id+'/files');
    var data = await res.json();
    if (!data.files.length) { el.innerHTML = '<div style="padding:8px;color:rgba(255,255,255,.3)">无文件</div>'; return }
    el.innerHTML = data.files.map(function(f) {
      var d = new Date(f.mtime);
      var t = d.getMonth()+1+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
      return '<div class="file"><span class="fn">'+esc(f.name)+'</span><span class="ft">'+t+'</span><span class="fs">'+fsize(f.size)+'</span><a class="fd" href="/auth/api/download/file?path='+encodeURIComponent(f.path)+'">下载</a></div>';
    }).join('');
  } catch(e) { el.innerHTML = '<div style="padding:8px;color:red">加载失败</div>'; }
}

function fsize(b) { return b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(1)+'KB' : (b/1048576).toFixed(1)+'MB' }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML }
load();
</script>
</body>
</html>
