<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>退出登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f1729 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .logout-container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .user-info {
      margin-bottom: 30px;
    }
    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
      font-weight: 600;
    }
    .username {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .email {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }
    .logout-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
    }
    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(239, 68, 68, 0.4);
    }
    .back-btn {
      display: block;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }
    .back-btn:hover { color: white; }
  </style>
</head>
<body>
  <div class="logout-container">
    <div class="user-info">
      <div class="avatar" id="avatar">A</div>
      <div class="username" id="username">admin</div>
      <div class="email" id="email">admin@example.com</div>
    </div>
    <button class="logout-btn" onclick="logout()">退出登录</button>
    <a href="/" class="back-btn">返回登录页</a>
  </div>

  <script>
    const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
    document.getElementById('username').textContent = userInfo.username || 'admin';
    document.getElementById('email').textContent = userInfo.email || '';
    document.getElementById('avatar').textContent = (userInfo.username || 'A').charAt(0).toUpperCase();

    function logout() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('user_info');
      window.location.href = '/';
    }
  </script>
</body>
</html>
