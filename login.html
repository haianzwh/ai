<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a0e27,#1a1a3e,#0f1729);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
.glow{position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;z-index:0}
.g1{width:400px;height:400px;background:radial-gradient(circle,#6366f1,transparent 70%);top:-100px;left:-100px}
.g2{width:500px;height:500px;background:radial-gradient(circle,#8b5cf6,transparent 70%);bottom:-150px;right:-150px}
.card{position:relative;z-index:10;width:420px;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border-radius:20px;border:1px solid rgba(255,255,255,.1);padding:40px;box-shadow:0 25px 50px rgba(0,0,0,.3)}
.logo{width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 10px 30px rgba(99,102,241,.4)}
.logo svg{width:32px;height:32px;color:#fff}
h1{text-align:center;color:#fff;font-size:24px;margin-bottom:8px}
.sub{text-align:center;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:32px}
.msg{display:none;align-items:center;gap:8px;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px}
.msg.show{display:flex}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.msg svg{width:18px;height:18px;flex-shrink:0}
.form-group{margin-bottom:20px}
.form-group label{display:block;color:rgba(255,255,255,.7);font-size:13px;margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap svg.icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,.3)}
.input-wrap input{width:100%;padding:14px 14px 14px 44px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:.2s}
.input-wrap input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.input-wrap input::placeholder{color:rgba(255,255,255,.3)}
.toggle-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;padding:4px}
.toggle-btn:hover{color:rgba(255,255,255,.6)}
.toggle-btn svg{width:18px;height:18px}
.options{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.remember{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer}
.remember input{accent-color:#6366f1}
.link{color:#6366f1;font-size:13px;text-decoration:none}
.link:hover{color:#8b5cf6}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;box-shadow:0 10px 30px rgba(99,102,241,.3)}
.btn:hover{transform:translateY(-1px);box-shadow:0 15px 40px rgba(99,102,241,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.link-row{text-align:center;margin-top:24px;color:rgba(255,255,255,.4);font-size:13px}
.link-row a{color:#6366f1;text-decoration:none;margin-left:4px}
.link-row a:hover{color:#8b5cf6}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="glow g1"></div><div class="glow g2"></div>
<div class="card">
<div class="logo"><img src="/logo.svg" alt="AI Chat" style="width:100%;height:100%;border-radius:16px"></div>
<h1>AI Chat</h1>
<p class="sub">登录您的账户</p>
<div id="msg" class="msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span id="msgText"></span></div>
<form id="loginForm">
<div class="form-group"><label>用户名</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="u" placeholder="请输入用户名" required></div></div>
<div class="form-group"><label>密码</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input type="password" id="p" placeholder="请输入密码" required><button type="button" class="toggle-btn" id="togglePwd"><svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
<div class="options"><label class="remember"><input type="checkbox" id="r"> 记住我</label><a href="#" class="link" id="goForgot">忘记密码？</a></div>
<button type="button" class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
<div class="link-row">还没有账户？<a href="#" id="goReg">立即注册</a></div>
</form>
<form id="regForm" style="display:none">
<div id="regOk" class="msg ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="regOkText"></span></div>
<div class="form-group"><label>用户名</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="ru" placeholder="3-20位字母/数字/下划线" required></div></div>
<div class="form-group"><label>邮箱</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg><input type="email" id="re" placeholder="your@email.com" required></div></div>
<div class="form-group"><label>密码</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input type="password" id="rp" placeholder="8位以上，含字母和数字" required><button type="button" class="toggle-btn" id="toggleRegPwd"><svg id="regEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
<div class="form-group"><label>确认密码</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input type="password" id="rc" placeholder="再次输入密码" required></div></div>
<button type="submit" class="btn" id="regBtn">注 册</button>
<div class="link-row">已有账户？<a href="#" id="goLogin">返回登录</a></div>
</form>
<form id="forgotForm" style="display:none">
<div class="form-group"><label>用户名</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="fu" placeholder="请输入用户名" required></div></div>
<div class="form-group"><label>邮箱</label><div class="input-wrap"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg><input type="email" id="fe" placeholder="your@email.com" required></div></div>
<button type="submit" class="btn" id="forgotBtn">发送重置邮件</button>
<div class="link-row">想起密码了？<a href="#" id="goLogin2">返回登录</a></div>
</form>
</div>
<script>
// 粒子背景
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth,canvas.height=window.innerHeight;
const ps=[];
for(let i=0;i<80;i++)ps.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2+.5,sx:Math.random()*.4-.2,sy:Math.random()*.4-.2,o:Math.random()*.4+.1});
(function A(){ctx.clearRect(0,0,canvas.width,canvas.height);ps.forEach(p=>{p.x+=p.sx;p.y+=p.sy;if(p.x>canvas.width)p.x=0;if(p.x<0)p.x=canvas.width;if(p.y>canvas.height)p.y=0;if(p.y<0)p.y=canvas.height;ctx.fillStyle=`rgba(99,102,241,${p.o})`;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fill()});for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){const d=Math.hypot(ps[i].x-ps[j].x,ps[i].y-ps[j].y);if(d<120){ctx.strokeStyle=`rgba(99,102,241,${(1-d/120)*.15})`;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.stroke()}}requestAnimationFrame(A)})();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth,canvas.height=window.innerHeight});

// 显示消息
const msgBox=document.getElementById('msg'),msgText=document.getElementById('msgText');
function showMsg(text,type){
  msgText.textContent=text;
  msgBox.className='msg show '+(type||'error');
  if(type!=='error') setTimeout(()=>msgBox.classList.remove('show'),3000);
}

// 密码切换
function togglePwd(inputId,iconId){
  const input=document.getElementById(inputId);
  const icon=document.getElementById(iconId);
  if(input.type==='password'){
    input.type='text';
    icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }else{
    input.type='password';
    icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
document.getElementById('togglePwd').addEventListener('click',()=>togglePwd('p','eyeIcon'));
document.getElementById('toggleRegPwd').addEventListener('click',()=>togglePwd('rp','regEyeIcon'));

// 表单切换
const loginForm=document.getElementById('loginForm');
const regForm=document.getElementById('regForm');
const forgotForm=document.getElementById('forgotForm');

document.getElementById('goReg').addEventListener('click',e=>{e.preventDefault();loginForm.style.display='none';regForm.style.display='block'});
document.getElementById('goLogin').addEventListener('click',e=>{e.preventDefault();regForm.style.display='none';loginForm.style.display='block'});
document.getElementById('goForgot').addEventListener('click',e=>{e.preventDefault();loginForm.style.display='none';forgotForm.style.display='block'});
document.getElementById('goLogin2').addEventListener('click',e=>{e.preventDefault();forgotForm.style.display='none';loginForm.style.display='block'});

// 记住我 - 恢复保存的账号
(function(){
  if(localStorage.getItem('remember_me')==='true'){
    const u2=localStorage.getItem('saved_username');
    const p2=localStorage.getItem('saved_password');
    if(u2){document.getElementById('u').value=u2;document.getElementById('p').value=p2||'';document.getElementById('r').checked=true}
  }
})();

// ====== 登录 ======
window.doLogin=async function(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const btn=document.getElementById('loginBtn');
  
  if(!u||!p){showMsg('请输入用户名和密码');return}
  
  btn.textContent='登录中...';btn.disabled=true;
  
  try{
    const res=await fetch('/auth/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})
    });
    const data=await res.json();
    if(data.success){
      localStorage.setItem('auth_token',data.token);
      localStorage.setItem('user_info',JSON.stringify(data.user));
      document.cookie = 'auth_token=' + data.token + ';path=/;max-age=86400;SameSite=Lax';
      if(document.getElementById('r').checked){
        localStorage.setItem('saved_username',u);
        localStorage.setItem('saved_password',p);
        localStorage.setItem('remember_me','true');
      }
      window.location.replace('http://www.zwhnb.top/');
    }else{
      showMsg(data.message||'用户名或密码错误');
      btn.textContent='登 录';btn.disabled=false;
    }
  }catch(err){
    showMsg('网络错误，请稍后重试');
    btn.textContent='登 录';btn.disabled=false;
  }
};

// Enter 键登录
document.getElementById('p').addEventListener('keydown',function(e){
  if(e.key==='Enter')doLogin();
});

// ====== 注册 ======
regForm.addEventListener('submit',async function(e){
  e.preventDefault();
  const u=document.getElementById('ru').value.trim();
  const email=document.getElementById('re').value.trim();
  const p2=document.getElementById('rp').value;
  const pc=document.getElementById('rc').value;
  const btn=document.getElementById('regBtn');
  const okBox=document.getElementById('regOk'),okText=document.getElementById('regOkText');
  okBox.classList.remove('show');
  
  if(!u){showMsg('用户名不能为空');return}
  if(u.length<3||u.length>20){showMsg('用户名长度3-20位');return}
  if(!/^[a-zA-Z0-9_]+$/.test(u)){showMsg('用户名只能包含字母数字下划线');return}
  if(!email){showMsg('邮箱不能为空');return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('邮箱格式不正确');return}
  if(!p2){showMsg('密码不能为空');return}
  if(p2.length<8){showMsg('密码至少8位');return}
  if(!/[a-zA-Z]/.test(p2)||!/[0-9]/.test(p2)){showMsg('密码需包含字母和数字');return}
  if(p2!==pc){showMsg('两次密码不一致');return}
  
  btn.textContent='注册中...';btn.disabled=true;
  
  try{
    const res=await fetch('/auth/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p2,email})
    });
    const data=await res.json();
    if(data.success){
      okText.textContent='注册成功！请登录';
      okBox.classList.add('show');
      btn.textContent='注 册';btn.disabled=false;
      document.getElementById('u').value=u;
      setTimeout(()=>{regForm.style.display='none';loginForm.style.display='block';okBox.classList.remove('show')},2000);
    }else{
      showMsg(data.message||'注册失败');
      btn.textContent='注 册';btn.disabled=false;
    }
  }catch(err){
    showMsg('网络错误');
    btn.textContent='注 册';btn.disabled=false;
  }
});

// ====== 忘记密码 ======
forgotForm.addEventListener('submit',async function(e){
  e.preventDefault();
  const u=document.getElementById('fu').value.trim();
  const email=document.getElementById('fe').value.trim();
  const btn=document.getElementById('forgotBtn');
  
  if(!u||!email){showMsg('请填写用户名和邮箱');return}
  
  btn.textContent='发送中...';btn.disabled=true;
  
  try{
    const res=await fetch('/auth/api/auth/forgot-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,email})
    });
    const data=await res.json();
    if(data.success){
      showMsg(data.message,'ok');
      btn.textContent='发送重置邮件';btn.disabled=false;
    }else{
      showMsg(data.message||'操作失败');
      btn.textContent='发送重置邮件';btn.disabled=false;
    }
  }catch(err){
    showMsg('网络错误');
    btn.textContent='发送重置邮件';btn.disabled=false;
  }
});
</script>
</body>
</html>
