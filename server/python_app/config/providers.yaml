# =============================================================================
#   AI Provider 配置
#   type: internal = 本进程内 Provider
#   type: external = 外部 ACP Agent（需启动子进程/连接远程服务）
# =============================================================================
providers:
  opencode:
    label: OpenCode
    icon: 🔗
    type: internal
    module: python_app.agent.opencode
    class: OpenCodeProvider
    requires_key: false
    models: []

  deepseek:
    label: DeepSeek
    icon: 🚀
    type: internal
    module: python_app.agent.deepseek
    class: DeepSeekProvider
    requires_key: true
    key_selector: deepseek
    default_key: "sk-bkDIjirVphhzxlpZDxKimOBKuuAvHyn10ZO4jnlVoZSwuhwaaUY9OknVWxDo1912"
    key_label: GO / ZEN API Key
    key_hint: 在 opencode.ai 获取
    key_link: https://opencode.ai/go
    sub_providers:
      go:
        label: DeepSeek (GO)
        endpoint: https://opencode.ai/zen/go/v1/chat/completions
        key_type: deepseek
    models:
      - id: deepseek-v4-pro
        name: DeepSeek V4 Pro
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash
