# =============================================================================
#   AI Provider 配置
#   每个 provider 可以是一个内置实现或者动态加载的插件
# =============================================================================
providers:
  opencode:
    label: OpenCode
    icon: 🔗
    type: builtin
    module: agent.opencode
    class: OpenCodeProvider
    requires_key: false
    # 模型列表为空表示从 API 动态获取
    models: []

  deepseek:
    label: DeepSeek
    icon: 🚀
    type: builtin
    module: agent.deepseek
    class: DeepSeekProvider
    requires_key: true
    key_selector: deepseek          # 前端用这个 key 来识别同一个 provider 的不同 key 变体
    key_label: GO / ZEN API Key
    key_hint: 在 opencode.ai 获取
    key_link: https://opencode.ai/go
    sub_providers:
      go:
        label: DeepSeek (GO)
        endpoint: https://opencode.ai/zen/go/v1/chat/completions
        key_type: deepseek
      zen:
        label: DeepSeek (ZEN)
        endpoint: https://opencode.ai/zen/v1/chat/completions
        key_type: zen
    models:
      - id: deepseek-v4-pro
        name: DeepSeek V4 Pro
      - id: deepseek-v4-flash
        name: DeepSeek V4 Flash
