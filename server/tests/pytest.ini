[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short --strict-markers --alluredir=reports/allure-results
markers =
    smoke: 冒烟测试（核心功能快速验证）
    auth: 认证相关测试
    project: 项目管理测试
    file: 文件操作测试
    chat: 聊天功能测试
    stats: 统计排名测试
    security: 安全测试
    slow: 慢速测试（>5秒）
