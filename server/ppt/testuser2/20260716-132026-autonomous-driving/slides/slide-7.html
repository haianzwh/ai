<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><style>
:root{
  --bg1:#0B1B33; --bg2:#0F2547; --card-from:#12294D; --card-to:#0E2040;
  --card-border:rgba(94, 162, 255, 0.22); --radius:14px; --text1:#EAF2FF; --text2:#9DB4D6;
  --a1:#3FA9F5; --a2:#5EE7C2; --a3:#FFB454; --a4:#B98CFF;
  --font:'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, -apple-system, 'Segoe UI', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#05101f;}
.slide{
  position:relative; width:1280px; height:720px; overflow:hidden;
  background:
    radial-gradient(900px 600px at 78% -12%, #16345f 0%, #0B1B33 58%) ,
    linear-gradient(135deg, #0B1B33 0%, #0F2547 100%);
  color:var(--text1); font-family:var(--font);
  padding:60px 72px; display:flex; flex-direction:column;
}
/* 环线母题装饰 */
.ring{position:absolute; border:1px solid rgba(94,162,255,.16); border-radius:50%; pointer-events:none;}
.ring.r1{width:520px;height:520px; right:-160px; top:-160px;}
.ring.r2{width:760px;height:760px; right:-260px; top:-260px;}
.ring.r3{width:340px;height:340px; left:-120px; bottom:-120px;}
.kicker{font-size:14px; letter-spacing:3px; color:var(--a1); font-weight:700; text-transform:uppercase; margin-bottom:10px;}
.title{font-size:40px; font-weight:800; line-height:1.15; margin:0 0 6px; letter-spacing:.5px;}
.subtitle{font-size:20px; color:var(--text2); margin-bottom:26px;}
.rule{height:4px;width:60px;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:3px;margin:10px 0 24px;}
.content{flex:1; min-height:0;}
/* 卡片 */
.card{position:relative; background:linear-gradient(160deg,var(--card-from),var(--card-to)); border:1px solid var(--card-border); border-radius:var(--radius); padding:22px 24px 22px 26px; overflow:hidden;}
.card .bar{position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:4px 0 0 4px;}
.card h3{margin:0 0 10px; font-size:22px; font-weight:700; color:#fff; letter-spacing:.3px;}
.card .body p{margin:0 0 8px; font-size:17px; line-height:1.55; color:var(--text2);}
.card.anchor{border-color:rgba(94,162,255,.5); box-shadow:0 8px 30px rgba(8,20,40,.5);}
.card.accent{border-color:rgba(94,162,255,.45);}
.card.elevated{box-shadow:0 10px 28px rgba(5,15,30,.45);}
.card.outline{background:rgba(255,255,255,.03);}
.card.transparent{background:transparent; border-style:dashed;}
/* 布局 */
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:26px; height:100%; align-content:center;}
.primary-sec{display:grid; grid-template-columns:1.5fr 1fr; gap:26px; height:100%; align-content:center;}
.primary-sec .anchor{grid-row:span 1;}
.grid-4{display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:1fr; gap:18px; height:100%;}
.grid-4 .card h3{font-size:17px;} .grid-4 .card .body p{font-size:16px;}
.stack{display:flex; flex-direction:column; gap:20px; justify-content:center; height:100%;}
.cover-wrap{display:flex; flex-direction:column; justify-content:center; align-items:flex-start; height:100%; gap:18px;}
.cover-wrap .card{border:none; background:transparent; padding:0;}
.cover-wrap .card h3{font-size:56px; font-weight:900; line-height:1.1; background:linear-gradient(90deg,#EAF2FF,#9FD0FF); -webkit-background-clip:text; background-clip:text; color:transparent;}
.cover-wrap .card .body p{font-size:24px; color:var(--text2);}
.cover-wrap .card.outline h3{font-size:26px; color:var(--a1); -webkit-text-fill-color:var(--a1); background:none;}
/* 目录 */
.toc-grid{display:grid; grid-template-columns:1fr 1fr; gap:22px 40px; align-content:center; height:100%;}
.toc-item{display:flex; gap:18px; align-items:flex-start; padding:18px 22px; background:linear-gradient(160deg,var(--card-from),var(--card-to)); border:1px solid var(--card-border); border-radius:var(--radius);}
.toc-no{font-size:34px; font-weight:900; color:var(--a1); line-height:1;}
.toc-item h3{margin:0 0 4px; font-size:22px; color:#fff;}
.toc-item p{margin:0; font-size:15px; color:var(--text2);}
.footer{position:absolute; bottom:22px; right:30px; font-size:14px; color:rgba(157,180,214,.6); letter-spacing:1px;}
.pagechip{position:absolute; bottom:22px; left:30px; font-size:14px; color:rgba(157,180,214,.6);}
.slide-header{margin-bottom:8px;}
</style></head>
<body><div class="slide">
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
  <header class="slide-header"><div class="kicker" style="color:#5EE7C2">MODULE</div><div class="title">规划的两大方法 — Frenet vs 搜索采样</div><div class="rule" style="background:linear-gradient(90deg,#5EE7C2,var(--a2))"></div></header>
  <div class="content"><div class="two-col">
      <div class="card outline anchor" data-card-id="c1">
        <span class="bar" style="background:#5EE7C2"></span>
        <h3>基于 Frenet 坐标系</h3>
        <div class="body"><p>横纵向解耦分别优化，计算效率高，适合高速等结构化道路</p></div>
      </div>
      <div class="card elevated" data-card-id="c2">
        <span class="bar" style="background:#3FA9F5"></span>
        <h3>基于搜索/采样 (MCTS)</h3>
        <div class="body"><p>模拟探索多种未来可能，选最优方案，更擅处理交互场景</p></div>
      </div></div></div>
  <footer class="slide-footer pagechip">自动驾驶 · 思考-行动-验证闭环</footer>
  <footer class="slide-footer footer">07 / 12</footer>
</div></body></html>
