<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>试试 Docker - 结尾</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
  width: 1280px; height: 720px; overflow: hidden;
  background: linear-gradient(135deg, #0d47a1 0%, #1a73e8 50%, #2196f3 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.circle { position: absolute; border-radius: 50%; opacity: 0.1; }
.circle-1 { width: 450px; height: 450px; background: #fff; top: -120px; left: -80px; }
.circle-2 { width: 300px; height: 300px; background: #fff; bottom: -100px; right: -60px; }
.circle-3 { width: 150px; height: 150px; background: #fff; top: 100px; right: 200px; }
.container { text-align: center; z-index: 1; padding: 3rem; max-width: 800px; }
h1 {
  font-size: 3.5rem; font-weight: 800; color: #fff;
  letter-spacing: -0.03em; margin-bottom: 1rem;
  text-shadow: 0 2px 10px rgba(0,0,0,0.15);
}
.subtitle {
  font-size: 1.3rem; font-weight: 400; color: rgba(255,255,255,0.85);
  margin-bottom: 2.5rem;
}
.divider { width: 60px; height: 3px; background: rgba(255,255,255,0.4); margin: 0 auto 2rem; border-radius: 2px; }
.action-items {
  display: flex; justify-content: center; gap: 1.5rem;
  margin-bottom: 2.5rem; flex-wrap: wrap;
}
.action-item {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 1rem 1.5rem;
  border-radius: 12px;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 500;
  display: flex; align-items: center; gap: 0.5rem;
}
.action-item .num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; background: rgba(255,255,255,0.2);
  border-radius: 50%; font-size: 0.8rem; font-weight: 700;
}
.final-msg {
  font-size: 1.1rem; color: rgba(255,255,255,0.7);
  margin-top: 0.5rem;
}
.footer {
  position: absolute; bottom: 2rem; left: 0; right: 0;
  text-align: center; color: rgba(255,255,255,0.4);
  font-size: 0.8rem;
}
</style>
</head>
<body>
<div class="circle circle-1"></div>
<div class="circle circle-2"></div>
<div class="circle circle-3"></div>
<div class="container">
  <h1>所以，试试？</h1>
  <div class="subtitle">从今天开始，用 Docker 改变你的开发体验</div>
  <div class="divider"></div>
  <div class="action-items">
    <div class="action-item">
      <span class="num">1</span>
      安装 Docker Desktop
    </div>
    <div class="action-item">
      <span class="num">2</span>
      容器化一个已有项目
    </div>
    <div class="action-item">
      <span class="num">3</span>
      和团队分享你的经验
    </div>
  </div>
  <div class="final-msg">
    🐳 试试看，你会发现新世界
  </div>
</div>
<div class="footer">试试 · Docker · 感谢聆听</div>
</body>
</html>
